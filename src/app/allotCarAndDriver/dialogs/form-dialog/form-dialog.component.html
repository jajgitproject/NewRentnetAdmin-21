<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}  ({{allotmentType}})</div>
                          <div *ngIf="normalizedStatus !== 'changes allow' && status"
       style="color:rgb(150, 4, 4); margin-top:5px; font-style: italic;">
    ({{status}}!!!!!)
                </div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close({isClose:true})" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Driver</mat-label>
                        <input required type="text" matInput formControlName="driverName"
                            [matAutocomplete]="auto1">
                        <mat-autocomplete #auto1="matAutocomplete">
                            <mat-option *ngFor="let option of filteredDriverOptions | async"
                                [value]="option.driverName"
                                (click)="getDriverID(option.driverID,option.driverName)">
                                {{option.driverName}}
                            </mat-option>
                        </mat-autocomplete>
                        <!-- <mat-error *ngIf="advanceTableForm.get('vehicle').hasError('required')">
                            Please Select Car
                        </mat-error> -->
                    </mat-form-field>
                </div>

                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Car</mat-label>
                        <input required type="text" matInput formControlName="vehicleName"
                            [matAutocomplete]="auto">
                        <mat-autocomplete #auto="matAutocomplete">
                            <mat-option *ngFor="let option of filteredVehicleOptions | async"
                                [value]="option.vehicle"
                                (click)="getVehicleID(option.vehicleID,option.vehicle)">
                                {{option.vehicle}}
                            </mat-option>
                        </mat-autocomplete>
                        <!-- <mat-error *ngIf="advanceTableForm.get('vehicle').hasError('required')">
                            Please Select Car
                        </mat-error> -->
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Registration Number</mat-label>
                        <input matInput formControlName="registrationNumber">
                    </mat-form-field>
                </div>

                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Vehicle Category</mat-label>
                        <input matInput formControlName="vehicleCategoryName">
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Inventory Owned Supplied</mat-label>
                        <input matInput formControlName="inventoryOwnedSupplied">
                    </mat-form-field>
                </div>

                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Inventory Supplier Name</mat-label>
                        <input matInput formControlName="inventorySupplierName">
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Driver Owned Supplied</mat-label>
                        <input matInput formControlName="driverOwnedSupplier">
                    </mat-form-field>
                </div>

                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Driver Supplier Name</mat-label>
                        <input matInput formControlName="driverSupplierName">
                    </mat-form-field>
                </div>
            </div>
                    <!-- <div class="row">
                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                            <mat-checkbox color="primary"  formControlName="isDriverAcceptanceRequired" (change)="CheckData()"
                            >IsDriverAcceptanceRequired</mat-checkbox>
                        </div>
                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                            <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                                <mat-label>Acceptance Notification Sent To DriverRemark</mat-label>
                                <input matInput formControlName="acceptanceNotificationSentToDriverRemark">
                            </mat-form-field>
                        </div>
                        
                    </div> -->
            <div class="row">
                 <!-- <span style="color:red;margin-bottom: 10px;">{{status}}</span> -->
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" [type]="submit" *ngIf="saveDisabled" [disabled]="!advanceTableForm.valid || isSubmitting || buttonDisabled"  (click)="Post()"> Confirm Allotment</button>
                        <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                        <!-- <button mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Reset</button> -->
                    </div>
                </div>
            </div>
        </form>
    </div>
