<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}} for {{CustomerContractCityTier}} in {{customerContractName}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">

            <div class="row">

             <!-- For Add Action -->
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2" *ngIf="this.action === 'add'">
            <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
              <mat-label>City Name</mat-label>
              <mat-select multiple formControlName="cityID" required #cityVal [class.is-invalid]="cityVal.invalid && cityVal.touched">
                <mat-option [value]="city.geoPointID" *ngFor="let city of CityList">
                  {{ city.geoPointName }}
                </mat-option>
              </mat-select>
              <mat-error *ngIf="advanceTableForm.controls['cityID'].hasError('required')">
                Please select a City
              </mat-error>
            </mat-form-field>
        
          </div>
          
          <!-- For Edit Action -->
          <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2" *ngIf="this.action === 'edit'">
            <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
              <mat-label>City Name</mat-label>
              <input required type="text" matInput [matAutocomplete]="auto2" formControlName="city">
              <mat-autocomplete #auto2="matAutocomplete"  (optionSelected)="onCitySelected($event.option.value)">
                <mat-option *ngFor="let options of filteredCityOptions | async"
                            [value]="options.geoPointName" (click)="getCityID(options.geoPointID, options.geoPointName)">
                  {{ options.geoPointName }}
                </mat-option>
              </mat-autocomplete>
              <mat-error *ngIf="advanceTableForm.controls['city'].hasError('invalidCitySelection')">
                Please Select City
              </mat-error>
            </mat-form-field>
            <div *ngIf="existCityMessage">
              <span style="color: red;"> City already exists</span>
            </div>
          </div>
  
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                            <mat-label>Activation Status</mat-label>
                            <mat-select formControlName="activationStatus">
                                <mat-option [value]=true>Active</mat-option>
                                <mat-option [value]=false>Deleted</mat-option>
                            </mat-select>
    
                            <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                                Activation Status is required
                            </mat-error>
                        </mat-form-field>
                    </div> 
            </div>                    
            
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button *ngIf="saveDisabled" color="primary" [type]="submit"  (click)="confirmAdd()">Save</button>
                        <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                        <!-- <button  mat-raised-button color="warn" (click)="reset()" tabindex="-1">Reset</button> -->
                        <button  mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
  </div>
