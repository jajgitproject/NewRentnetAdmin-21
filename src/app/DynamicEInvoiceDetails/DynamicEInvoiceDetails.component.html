<div class="modalHeader">
  <div class="modal-about">
    <div class="font-weight-bold p-t-5 font-17">
      {{ dialogTitle }}
    </div>
  </div>

  <button mat-icon-button (click)="dialogRef.close()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-card>
  <mat-card-content>
    <mat-dialog-content>

      <ng-container *ngIf="formattedPayload; else noPayload">

        <div class="row mb-3">
          <div class="col-12">
            <h4>Dynamics API Request Payload</h4>

            <!-- ✅ formatted JSON -->
            <pre style="max-height: 400px; overflow: auto; background:#f5f5f5; padding:10px;">
                     {{ formattedPayload }}
            </pre>

          </div>
        </div>

      </ng-container>

      <ng-template #noPayload>
        <div class="alert alert-warning">
          Payload data not available or could not be parsed.
        </div>
      </ng-template>

    </mat-dialog-content>
  </mat-card-content>
</mat-card>
