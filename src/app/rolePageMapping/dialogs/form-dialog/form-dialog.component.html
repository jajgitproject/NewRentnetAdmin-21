<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">

                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Page Group</mat-label>
                        <input required type="text" matInput [matAutocomplete]="auto2" formControlName="pageGroup">
                        <mat-autocomplete #auto2="matAutocomplete"  (optionSelected)="OnPageGroupSelect($event.option.value)">
                            <mat-option *ngFor="let options of filteredPageGroupOptions | async"
                                [value]="options.pageGroup" (click)="getPageGroupID(options.pageGroupID)">
                                {{options.pageGroup}}
                            </mat-option>
                        </mat-autocomplete>
                        <mat-error *ngIf="advanceTableForm.controls['pageGroup'].hasError('pageGroupInvalid')">
                            Please select a Parent
                        </mat-error>
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2" *ngIf="this.action==='add'">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always"> 
                        <mat-label>Pages</mat-label>                       
                        <!-- <input required type="text" matInput [matAutocomplete]="auto1" formControlName="page">
                        <mat-autocomplete #auto1="matAutocomplete">
                            <mat-option *ngFor="let options of filteredPageOptions | async"
                                [value]="options.page" (click)="getTitles(options.pageID)">
                                {{options.page}}
                            </mat-option>
                        </mat-autocomplete> -->
                        <mat-select multiple formControlName="pageID" required #PVal [class.is-invalid]="PVal.invalid && PVal.touched">
                            <mat-option  [value]="Page.pageID" *ngFor="let Page of PageList" >{{Page.page}}</mat-option>
                        </mat-select>
                        <mat-error *ngIf="advanceTableForm.get('page').hasError('required')">
                            Page is required
                        </mat-error>
                    </mat-form-field>
                    <div *ngIf="existPageMessage">
                        <span style="color: red;"> All Pages already exists</span>
                    </div>
                </div>

                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2" *ngIf="this.action==='edit'">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always"> 
                        <mat-label>Pages</mat-label>                       
                        <input required type="text" matInput [matAutocomplete]="auto1" formControlName="page">
                        <mat-autocomplete #auto1="matAutocomplete">
                            <mat-option *ngFor="let options of filteredPageOptions | async"
                                [value]="options.page" (click)="getTitles(options.pageID)">
                                {{options.page}}
                            </mat-option>
                        </mat-autocomplete>
                        <mat-error *ngIf="advanceTableForm.get('page').hasError('required')">
                            Page is required
                        </mat-error>
                    </mat-form-field>
                    <div *ngIf="existPageMessage">
                        <span style="color: red;"> All Pages already exists</span>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Activation Status</mat-label>
                        <mat-select formControlName="activationStatus">
                            <mat-option [value]=true>Active</mat-option>
                            <mat-option [value]=false>Deleted</mat-option>
                        </mat-select>

                        <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                            Activation Status is required
                        </mat-error>
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" [type]="submit" [disabled]="!advanceTableForm.valid || isSaveDisabled"  (click)="confirmAdd()">Save</button>
                        <button mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
