<div *ngFor="let data of advanceTableLR;index as i " >


    <div class="row" style="margin-left: 20px;margin-top: 20px;">
        <!-- <a style="cursor: pointer;color: #007bff;"  (click)="LumpsumRate(i)">
            LumpsumRateDetails {{i+1}} - Edit - Delete</a> -->
            <a style="cursor: pointer; color: #007bff;">
                Lumpsum Rate Details {{i + 1}} -
                <span style="cursor: pointer; color: #007bff;" (click)="LumpsumRate(i)">Edit</span> -
                <span style="cursor: pointer; color: #007bff;" (click)="deleteItem(i)">Delete</span>
            </a>
    </div>

    <div class="row" style="margin-left: 20px;margin-top: 20px;">
        <div class="col-xl-4 col-lg-6 col-md-12 col-sm-12 mb-2">
            <span>
                <b>
                    Amount
                </b>
            </span>
            <br />
            <span>{{data.lumpsumRatePercentage}}</span>
        </div>

        <div class="col-xl-4 col-lg-6 col-md-12 col-sm-12 mb-2">
            <span>
                <b>
                   Approved By
                </b>
            </span>
            <br />
            <span>{{data.firstName}} {{data.lastName}}</span>
        </div>

        <div class="col-xl-4 col-lg-6 col-md-12 col-sm-12 mb-2">
            <span>
                <b>
                    Attachment
                </b>
            </span>
            <br />
            <span>
                <a href="{{data.attachment}}" target="_blank" style="cursor: pointer;color: #007bff;">
                <!-- View -->
                <img [src]="data.attachment" style="max-width: 70px; max-height: 70px;" />
                </a>
            </span>
        </div>
    </div>

    
</div>
