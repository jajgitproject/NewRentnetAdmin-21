<div class="row">
    <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="card"  style="width: 1000px;">
            <div class="body">
                <div class="responsive_table">
                  

                    <p *ngIf="!dataSource; then thenBlock2 else elseBlock2">
                        This is not rendered
                    </p>

                    <ng-template #thenBlock2>
                        <div class="alert alert-primary" style="background-color:#E8E8E8; text-align: center;">No Records Found</div>
                        <div class="body">
                            <div class="example-button-row">

                                <button mat-raised-button color="primary" (click)="PreviousCall()">Previous</button>
                                <button mat-raised-button color="primary" (click)="NextCall()">Next</button>

                            </div>
                        </div>

                    </ng-template>

                    <ng-template #elseBlock2>
                          <div class="scrollable-table-container">
                    <mat-table #table [dataSource]="dataSource" matSort class="mat-cell floating-header-table" (matSortChange)="SortingData($event)">
                        <ng-container matColumnDef="id">
                            <mat-header-cell *matHeaderCellDef mat-sort-header>Id</mat-header-cell>
                            <mat-cell *matCellDef="let row">{{row.organizationalEntityStakeHoldersid}}</mat-cell>
                        </ng-container>



                        <ng-container matColumnDef="organizationalEntityName">
                            <mat-header-cell *matHeaderCellDef mat-sort-header>Organizational Entity</mat-header-cell>
                            <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                {{row.organizationalEntityName}}</mat-cell>
                        </ng-container>

                        <ng-container matColumnDef="department">
                            <mat-header-cell *matHeaderCellDef mat-sort-header>Department</mat-header-cell>
                            <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                {{row.department}}</mat-cell>
                        </ng-container>
                        <ng-container matColumnDef="designation">
                            <mat-header-cell *matHeaderCellDef mat-sort-header>Designation</mat-header-cell>
                            <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                {{row.designation}}</mat-cell>
                        </ng-container>

                        <ng-container matColumnDef="startDate">
                            <mat-header-cell *matHeaderCellDef mat-sort-header>From</mat-header-cell>
                            <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                {{row.startDate}}</mat-cell>
                        </ng-container>
                        <ng-container matColumnDef="endDate">
                            <mat-header-cell *matHeaderCellDef mat-sort-header>To</mat-header-cell>
                            <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                {{row.endDate}}</mat-cell>
                        </ng-container>
                        
                       
                        <!-- actions -->
                        <ng-container matColumnDef="actions">
                            <mat-header-cell *matHeaderCellDef class="pr-0" [ngClass]="'tbl-col-width-per-9'">Actions</mat-header-cell>
                            <mat-cell *matCellDef="let row; let i=index;" class="pr-0" [ngClass]="'tbl-col-width-per-9'">
                                <button mat-raised-button color="primary" (contextmenu)="onContextMenu($event, row)" (click)="onContextMenu($event, row)">
                                    Actions
                            </button>
                            </mat-cell>
                        </ng-container>
                        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                        <mat-row *matRowDef="let row; columns: displayedColumns;" [style.cursor]="'pointer'" matRipple>
                        </mat-row>
                    </mat-table>
                    </div>
                    
                    <div class="body">
                        <div class="example-button-row">

                            <button mat-raised-button color="primary" (click)="PreviousCall()">Previous</button>
                            <button mat-raised-button color="primary" (click)="NextCall()">Next</button>

                        </div>
                    </div>

                </ng-template>

                </div>
            </div>
        </div>
    </div>
</div>
