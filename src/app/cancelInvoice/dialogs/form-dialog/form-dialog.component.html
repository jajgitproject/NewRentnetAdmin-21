<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close({isClose:true})" aria-label="Close dialog">
            <mat-icon>close</mat-icon>
        </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Reason</mat-label>
                        <mat-select formControlName="invoiceCancelationReason" required>
                            <mat-option value="Duplicate">Duplicate</mat-option>
                            <mat-option value="Data Entry Mistake">Data Entry Mistake</mat-option>
                            <mat-option value="Order Cancelled">Order Cancelled</mat-option>
                            <mat-option value="Other">Other</mat-option>
                        </mat-select>
                        <mat-error *ngIf="advanceTableForm.get('invoiceCancelationReason').hasError('required')">
                            Please seelct Invoice Cancelation Reason
                        </mat-error>
                    </mat-form-field>
                </div>
            
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Cancelation Remark</mat-label>
                        <input matInput formControlName="invoiceCancelationRemark" required>
                        <mat-error *ngIf="advanceTableForm.get('invoiceCancelationRemark').hasError('required')">
                            Please Enter Invoice Cancelation Remark
                        </mat-error>
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" *ngIf="saveDisabled" [type]="submit" [disabled]="!advanceTableForm.valid"
                         (click)="confirmAdd()">Save</button>
                         <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                         <button mat-raised-button color="warn" (click)="onNoClick(action)" tabindex="-1">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
