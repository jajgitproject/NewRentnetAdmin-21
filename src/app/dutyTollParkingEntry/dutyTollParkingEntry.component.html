<mat-accordion>
    <mat-expansion-panel>
    <mat-expansion-panel-header>
        <mat-panel-title></mat-panel-title>
    </mat-expansion-panel-header>
    <div class="row">
        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
            <div class="card">
                <div class="body">
                    <div class="responsive_table">                            
                            <mat-table #table [dataSource]="tollParkingAdvanceTable" matSort class="mat-cell">
                                <ng-container matColumnDef="type">
                                    <mat-header-cell *matHeaderCellDef>Type</mat-header-cell>
                                    <mat-cell *matCellDef="let row">{{row.tollParkingType}}</mat-cell>
                                </ng-container>

                                <ng-container matColumnDef="amount">
                                    <mat-header-cell *matHeaderCellDef>Amount</mat-header-cell>
                                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                        {{row.tollParkingAmount}}</mat-cell>
                                </ng-container>

                                <ng-container matColumnDef="paidBy">
                                    <mat-header-cell *matHeaderCellDef>Paid By</mat-header-cell>
                                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                        {{row.paymentType}}</mat-cell>
                                </ng-container>

                                <!-- <ng-container matColumnDef="image">
                                    <mat-header-cell *matHeaderCellDef>Image</mat-header-cell>
                                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                        <a href="{{data.tollParkingImage}}" target="_blank" style="cursor: pointer;">
                                            <img [src]="data.tollParkingImage" height="50px" alt="Image">
                                        </a>
                                    </mat-cell>
                                </ng-container> -->

                                <ng-container matColumnDef="image">
                                    <mat-header-cell *matHeaderCellDef [ngClass]="'tbl-col-width-per-12'">Image</mat-header-cell>
                                    <mat-cell *matCellDef="let row" class="table-img tbl-col-width-per-12 image-cell" (contextmenu)="onContextMenu($event, row)">
                                       <img class="toll-image-thumb" style="cursor: pointer;" src="{{row.tollParkingImage}}" (click)="openImageInNewTab(row.tollParkingImage)"/> </mat-cell>
                                </ng-container>

                                <ng-container matColumnDef="approvalStatus">
                                    <mat-header-cell *matHeaderCellDef>Approval Status</mat-header-cell>
                                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                        {{row.approvalStatus}}</mat-cell>
                                </ng-container>
                                <!-- actions -->
                                <ng-container matColumnDef="actions">
                                    <mat-header-cell *matHeaderCellDef class="pr-0"
                                        [ngClass]="'tbl-col-width-per-9'">Actions</mat-header-cell>
                                    <mat-cell *matCellDef="let row; let i=index;" class="pr-0"
                                        [ngClass]="'tbl-col-width-per-9'">
                                        <button mat-raised-button color="primary"
                                            (contextmenu)="onContextMenu($event, row)"
                                            (click)="onContextMenu($event, row)">
                                            Actions
                                        </button>
                                    </mat-cell>
                                </ng-container>
                                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                                <mat-row *matRowDef="let row; columns: displayedColumns;" [style.cursor]="'pointer'"
                                    matRipple>
                                </mat-row>
                            </mat-table>
                            <!-- context menu start -->
                            <div style="visibility: hidden; position: fixed" [style.left]="contextMenuPosition.x"
                                [style.top]="contextMenuPosition.y" [matMenuTriggerFor]="contextMenu">
                            </div>
                            <mat-menu #contextMenu="matMenu">
                                <ng-template matMenuContent let-item="item">
                                    <!-- <button mat-menu-item (click)="editCall(item)">
                                    <mat-icon>create</mat-icon>
                                    <span>Edit</span>
                                    </button>
                                    <button *ngIf="shouldShowDeleteButton(item)" mat-menu-item (click)="deleteItem(item)">
                                    <mat-icon>delete</mat-icon>
                                    <span>Delete</span>
                                    </button> -->
                                        <button mat-menu-item  
                                           
                                            (click)="editCall(item)">
                                             <mat-icon>create</mat-icon>
                                            Edit
                                        </button>
                                         <button mat-menu-item 
                                           
                                            (click)="openDutyTollParkingApproval(item)">
                                             <mat-icon>create</mat-icon>
                                            Approval
                                    </button>
                                </ng-template>
                            </mat-menu>
                              
                    </div>
                </div>
            </div>
        </div>
    </div>
    </mat-expansion-panel>
</mat-accordion>
