<div class="card search-card">

  <div class="card-header">
    <h5>Reservation / Dutyslip Search</h5>
  </div>

  <div class="card-body">

    <div class="row">

      <div class="col-md-5">
        <mat-form-field appearance="outline" style="width:100%" floatLabel="always">
          <mat-label>Booking Number</mat-label>
          <input matInput [(ngModel)]="reservationID"
          (ngModelChange)="onInputChange()"
          [disabled]="isReservationDisabled">
        </mat-form-field>
      </div>

      <div class="col-md-5">
        <mat-form-field appearance="outline" style="width:100%" floatLabel="always">
          <mat-label>Dutyslip Number</mat-label>
          <input matInput [(ngModel)]="dutyslipID"
          (ngModelChange)="onInputChange()"
          [disabled]="isDutySlipDisabled">
        </mat-form-field>
      </div>

      <div class="col-md-2" style="margin-top:5px;">
        <button mat-raised-button color="primary" (click)="SearchData()">
          Search
        </button>
      </div>

    </div>

  </div>

</div>
