<div class="modalHeader">
  <div class="editRowModal">
    <div class="modalHeader clearfix">
      <div class="modal-about">
        <div class="font-weight-bold p-t-5 font-17">
          {{ dialogTitle }}
        </div>
      </div>
    </div>
  </div>

  <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
    <mat-icon class="small-close-icon">close</mat-icon>
  </button>
</div>

<mat-card>
  <mat-card-content>
    <mat-dialog-content class="of-hidden">
      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">

          <span class="TDValueBold">DutySlip Image</span>
          <br />

          <span class="table-img tbl-col-width-per-12">
            <app-static-image
              *ngIf="imageUrl && !isPdf"
              [src]="imageUrl"
              maxWidth="250px"
              width="100%"
              alt="Duty Slip Image"
              cssClass="duty-slip-image-thumb"></app-static-image>
              <img *ngIf="isPdf" src="assets/pdf-icon.png"  style="cursor:pointer;height:20px;width:auto;" (click)="openImageInNewTab(imageUrl)">
          </span>

          <!-- Delete Button -->
         <div class="mt-2" *ngIf="hasImage()">
  <button
    mat-stroked-button
    color="warn"
    class="delete-btn"
    (click)="deleteImage()">
    Delete
  </button>
</div>

        </div>
      </div>
    </mat-dialog-content>
  </mat-card-content>
</mat-card>
