<div class="addContainer">
  <div class="modalHeader">
      <div class="editRowModal">
          <div class="modalHeader clearfix">
              <!-- <img [src]='advanceTable.img' alt="avatar"> -->
              <div class="modal-about">
                <div class="font-weight-bold p-t-5 font-17">
                    Duplicate Booking With Date Range
                </div>
                <h4>
                    {{CustomerName}} - {{PassengerName}} - <br>
                    {{City}} - {{PickupDate | date:'dd/MM/yyyy'}} - {{PickupTime | date:'hh:mm'}}
                </h4>
              </div>
          </div>
      </div>
      <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
    <mat-icon>close</mat-icon>
  </button>
  </div>
  <div mat-dialog-content>
      <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
        <div class="row">
            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
              <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                  <mat-label>Start Date</mat-label>
                  <input required matInput [matDatepicker]="regFromDate" [matDatepickerFilter]="dateFilter"  placeholder="DD/MM/YYYY" formControlName="startDate"  (blur)="onBlurUpdateDate($event.target.value)"  >
                  <mat-datepicker-toggle matSuffix [for]="regFromDate"></mat-datepicker-toggle>
                  <mat-datepicker #regFromDate></mat-datepicker>
                  <mat-error *ngIf="advanceTableForm.get('startDate').hasError('required')">
                    Start Date is required
                  </mat-error>
                  <mat-error *ngIf="advanceTableForm.get('startDate')?.hasError('invalidDate')">
                      Invalid date format. Use DD/MM/YYYY.
                    </mat-error>
              </mat-form-field>
            </div>

            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
              <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                  <mat-label>End Date</mat-label>
                  <input required matInput [matDatepicker]="regEndDate" [matDatepickerFilter]="dateFilter"  placeholder="DD/MM/YYYY" formControlName="endDate"  (blur)="onBlurUpdateEndDate($event.target.value)"  >
                  <mat-datepicker-toggle matSuffix [for]="regEndDate"></mat-datepicker-toggle>
                  <mat-datepicker #regEndDate></mat-datepicker>
                  <mat-error *ngIf="advanceTableForm.get('endDate').hasError('required')">
                      End Date is required
                  </mat-error>
                  <mat-error *ngIf="advanceTableForm.get('endDate')?.hasError('invalidDate')">
                      Invalid date format. Use DD/MM/YYYY.
                    </mat-error>
              </mat-form-field>
            </div>       
        </div>
        <br>
          <div class="row">
            
              <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                  <div class="example-button-row">
                      <button mat-raised-button color="primary" *ngIf="saveDisabled" [type]="submit" [disabled]="buttonDisabled || !advanceTableForm.valid" (click)="duplicateWithRange()" >Save</button>
                      <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                      <button mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                  </div>
              </div>
          </div>
      </form>
  </div>
