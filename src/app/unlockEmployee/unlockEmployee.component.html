<section class="content">
    <div class="container-fluid">
        <div class="block-header">
            <div class="row">
                <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                    <ul>
                        <li class="breadcrumb-item bcrumb-1">
                            <a routerLink="/dashboard/main">
                                <i class="fas fa-home"></i> Home</a>|
                            <a href="#" onClick="return false;">Admin</a>|
                            <a href="#" onClick="return false;">Unlock Employee</a>
                        </li>
                    </ul>
                    <ul class="breadcrumb breadcrumb-style ">
                        <li class="breadcrumb-item">
                            <h2>Unlock Employee</h2>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                <div class="card">
                    <div class="body">
                        <div class="responsive_table">
                            <div class="materialTableHeader">
                                <div class="row">
                                    <ng-template #searchDialog let-dialogRef="dialogRef">
    <h2 mat-dialog-title>Unlock Employee</h2>
    <div mat-dialog-content>
<mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                                                        <mat-label>Unlock Employee</mat-label>
                                                        <input type="text" matInput 
                                                            [(ngModel)]="SearchName">

                                                    </mat-form-field>

                                                    <mat-form-field class="example-full-width mb-3"
                                                        appearance="outline" floatLabel="always">
                                                        <mat-label>Activation Status</mat-label>
                                                        <mat-select [(value)]="SearchActivationStatus">
                                                            <mat-option [value]=true>Active</mat-option>
                                                            <mat-option [value]=false>Deleted</mat-option>
                                                        </mat-select>
                                                    </mat-form-field>
    </div>
    <div mat-dialog-actions align="end">
        <button mat-button (click)="dialogRef.close()">Cancel</button>
        <button mat-raised-button color="primary" (click)="SearchFromDialog(dialogRef)">Search</button>
    </div>
</ng-template>
                                    <!-- <div style="width: 70%; float:left;padding-top: 10px;padding-left: 22px;">
                                        <div *ngIf="SearchName" style="float: left;"><b>Unlock Employee</b> : {{SearchName}},</div>
                                    </div> -->

                                    <div style="width: 70%; float:left;padding-top: 6px;padding-left: 12px;">
                                        <div class="col-lg-6">
                                            <div class="form-group">
                                                <div class="input-group">
                                                    <!-- Dropdown for selecting Type, Parent, City -->
                                                    <div class="input-group-append input-group-addon">
                                                        <select style="height: 40px; width: 170px;" class="form-control" [(ngModel)]="selectedFilter">
                                                            <option value="search" hidden>Search By</option>
                                                            <option value="unlockEmployee">Unlock Employee</option>
                                                        </select>
                                                    </div>
                                        
                                                    <!-- Input field for filtering -->
                                                    <input type="text" style="height: 40px; width: 300px;padding-left: 5px;" class="form-control" placeholder="Filter" id="inputGroup"
                                                        (keyup)="onBackPress($event)" (input)="loadData()" [(ngModel)]="searchTerm" />
                                        
                                                    <!-- Search button -->
                                                    <div class="input-group-append input-group-addon">
                                                        <span class="input-group-text" style="cursor: pointer; height: 40px; width: 40px; text-align: center;" (click)="loadData()">
                                                            <i class="fas fa-search"></i>
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>                                        
                                    </div>

                                    <div style="width: 30%; text-align: right;">

                                        <button mat-raised-button color="primary" (click)="openSearchDialog()">
                                            Search
                                        </button>
                                        &nbsp;
                                        <!-- <button mat-mini-fab color="primary" (click)="addNew()">
                                            <mat-icon class="col-white">add</mat-icon>
                                        </button> -->
                                        &nbsp;
                                        <button mat-mini-fab color="primary" (click)="refresh()">
                                            <mat-icon class="col-white">refresh</mat-icon>
                                        </button>

                                    </div>
                                </div>
                            </div>

                            <!-- <label>
                                <input type="checkbox" [(ngModel)]="isChecked">
                                Check me!
                            </label> -->
                            <!-- <p>Checkbox is {{ isChecked ? 'checked' : 'unchecked' }}</p> -->
                            <p *ngIf="!dataSource; then thenBlock2 else elseBlock2">
                                This is not rendered
                            </p>

                            <ng-template #thenBlock2>
                                <div class="alert alert-primary" style="background-color:#E8E8E8; text-align: center;">
                                    No Records Found</div>
                                <div class="body">
                                    <div class="example-button-row">

                                        <button mat-raised-button color="primary"
                                            (click)="PreviousCall()">Previous</button>
                                        <button mat-raised-button color="primary" (click)="NextCall()">Next</button>

                                    </div>
                                </div>

                            </ng-template>

                            <ng-template #elseBlock2>
                                <div class="scrollable-table-container">
                                <mat-table #table [dataSource]="dataSource" matSort class="mat-cell floating-header-table"
                                    (matSortChange)="SortingData($event)">
                                    <ng-container matColumnDef="check">
                                        <mat-header-cell *matHeaderCellDef>
                                            <mat-checkbox></mat-checkbox></mat-header-cell>
                                        <mat-cell *matCellDef="let row">
                                            <mat-checkbox></mat-checkbox>
                                        </mat-cell>
                                    </ng-container>

                                    <ng-container matColumnDef="id">
                                        <mat-header-cell *matHeaderCellDef mat-sort-header>Id</mat-header-cell>
                                        <mat-cell *matCellDef="let row">{{row.EmployeeEntityID}}</mat-cell>
                                    </ng-container>

                                    <ng-container matColumnDef="EmployeeEntityName">
                                        <mat-header-cell *matHeaderCellDef mat-sort-header>Name</mat-header-cell>
                                        <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                            {{row.employeeEntityName}}</mat-cell>
                                    </ng-container>
                                   

                                    <ng-container matColumnDef="EmployeeEntityPhone">
                                        <mat-header-cell *matHeaderCellDef mat-sort-header>Mobile</mat-header-cell>
                                        <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                            {{row.employeeEntityPhone}}</mat-cell>
                                    </ng-container>
                                    <ng-container matColumnDef="EmployeeEntityEmail">
                                        <mat-header-cell *matHeaderCellDef mat-sort-header>Email</mat-header-cell>
                                        <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                            {{row.employeeEntityEmail}}</mat-cell>
                                    </ng-container>
                                     
                                  


                                    <!-- actions -->
                                    <ng-container matColumnDef="unlock">
                                        <mat-header-cell *matHeaderCellDef class="pr-0"
                                            [ngClass]="'tbl-col-width-per-9'">Actions</mat-header-cell>
                                        <mat-cell *matCellDef="let row; let i=index;" class="pr-0"
                                            [ngClass]="'tbl-col-width-per-9'">

                                            <button mat-raised-button color="primary"
                                                (contextmenu)="onContextMenu($event, row)"
                                                (click)="unlock(row)">
                                                Unlock
                                            </button>
                                        </mat-cell>
                                    </ng-container>

                                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                                    <mat-row *matRowDef="let row; columns: displayedColumns;" [style.cursor]="'pointer'"
                                        matRipple>
                                    </mat-row>
                                </mat-table>
                                </div>
                                <!-- Loading spinner -->
                                <!-- <div *ngIf="exampleDatabase.isTblLoading" class="tbl-spinner">
                                <mat-progress-spinner color="primary" [diameter]="40" mode="indeterminate">
                                </mat-progress-spinner>
                            </div> -->

                                <!-- context menu start -->
                                <div style="visibility: hidden; position: fixed" [style.left]="contextMenuPosition.x"
                                    [style.top]="contextMenuPosition.y" [matMenuTriggerFor]="contextMenu">
                                </div>
                                <mat-menu #contextMenu="matMenu">
                                    <ng-template matMenuContent let-item="item">
                                        <!-- <button mat-menu-item (click)="addNew()">
                    <mat-icon>add_box</mat-icon>
                    <span>Add</span>
                  </button> -->
                                        <!-- <button mat-menu-item (click)="editCall(item)">
                                            <mat-icon>create</mat-icon>
                                            <span>Edit</span>
                                        </button>
                                        <button mat-menu-item (click)="deleteItem(item)">
                                            <mat-icon>delete</mat-icon>
                                            <span>Delete</span>
                                        </button> -->
                                        <!-- <button mat-menu-item>
                                            <mat-icon>Add</mat-icon>
                                            <span>Add Desgination</span>
                                        </button>
                                        <button mat-menu-item>
                                            <mat-icon>View</mat-icon>
                                            <span>View Desgination</span>
                                        </button>
                                        <button mat-menu-item>
                                            <mat-icon>delete</mat-icon>
                                            <span>Delete Desgination</span>
                                        </button> -->
                                        <!-- <button mat-menu-item (click)="refresh()">
                    <mat-icon>refresh</mat-icon>
                    <span>Refresh</span>
                  </button> -->

                                    </ng-template>
                                </mat-menu>

                                <!-- context menu end -->

                                <!-- <div *ngIf="!exampleDatabase.isTblLoading" class="no-results" [style.display]="dataSource.renderedData.length == 0 ? '' : 'none'">
                                No results
                            </div> -->

                                <div class="body">
                                    <div class="example-button-row">

                                        <button mat-raised-button color="primary"
                                            (click)="PreviousCall()">Previous</button>
                                        <button mat-raised-button color="primary" (click)="NextCall()">Next</button>

                                    </div>
                                </div>

                            </ng-template>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
