<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        Customer Details</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field appearance="outline" floatLabel="always" class="example-full-width" >
                        <mat-label>Customer Type</mat-label>
                         <mat-select >
                            <mat-option value="Corporate">Corporate</mat-option>
                            <mat-option value="Corporate Individual">Corporate Individual</mat-option>
                            <mat-option value="Individual">Individual</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                        <mat-label>Customer (Customer Group)</mat-label>
                        <input required matInput formControlName="customerDetails">
                                                              
                    </mat-form-field>
                    <a style="cursor: pointer;color: #007bff;float: left;margin-top:-15px;" (click)="addPassengers()">
                        New Customer</a>

                </div>
            </div>

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                        <mat-label>Booker</mat-label>
                        <input  matInput>
                    </mat-form-field>
                    <a style="cursor: pointer;color: #007bff;float: left;margin-top:-15px;" (click)="addPassengers()">
                        New Booker</a>
                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                        <mat-label>Passenger (Gender, VIP Status)</mat-label>
                        <input  matInput>   
                    </mat-form-field>
                    <a style="cursor: pointer;color: #007bff;float: left;margin-top:-15px;" (click)="addPassengers()">
                        New Passenger</a>
                </div>
            </div>

           
           
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                        <mat-label>City</mat-label>
                        <input  matInput>
                    </mat-form-field>
                   
                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                        <mat-label>Car</mat-label>
                        <input  matInput>   
                    </mat-form-field>
                  
                </div>
            </div>
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                        <mat-label>Duty Type</mat-label>
                        <input  matInput>
                    </mat-form-field>
                   
                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                        <mat-label>Package</mat-label>
                        <input  matInput>   
                    </mat-form-field>
                  
                </div>
            </div>

            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button style="background-color: #bcb4db">Save</button>
                        <button mat-raised-button style="background-color: #f29f99">Cancel</button>
                    </div>
                </div>
            </div>

        </form>
    </div>
</div>
