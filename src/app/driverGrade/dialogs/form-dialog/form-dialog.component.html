<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Grade Name</mat-label>
                        <input required matInput formControlName="driverGradeName">

                        <mat-error *ngIf="advanceTableForm.get('driverGradeName').hasError('required')">
                            Grade Name is required
                        </mat-error>
                    </mat-form-field>
                </div>

                        <mat-select required #nextGradeVal [class.is-invalid]="nextGradeVal.invalid && nextGradeVal.touched" 
                        formControlName="nextGradeID">

                            *ngFor="let NextGrade of DriverGradeList">{{NextGrade.driverGradeName}}</mat-option>
                        </mat-select>

                            Please select a Next Grade
                        </mat-error>
                    </mat-form-field>
                </div>  -->
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always"> 
                        <mat-label>Next Grade</mat-label>                       
                        <input  type="text" matInput [matAutocomplete]="auto"
                        formControlName="nextGrade">
                        <mat-autocomplete #auto="matAutocomplete">
                            <mat-option *ngFor="let options of filteredOptions | async"
                                [value]="options.driverGradeName" (click)="getTierID(options.driverGradeID)">
                                {{options.driverGradeName}}
                            </mat-option>
                        </mat-autocomplete>

                    </mat-form-field>
                </div>

            </div>
            <div class="row">
                <!-- <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">

                        <mat-select required #previousGradeVal [class.is-invalid]="previousGradeVal.invalid && previousGradeVal.touched" 
                        formControlName="previousGradeID">

                        </mat-error>
                    </mat-form-field>

                </div> -->
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always"> 
                        <mat-label>Previous Grade</mat-label>                       
                        <input type="text" matInput [matAutocomplete]="auto1"
                        formControlName="previousGrade">
                        <mat-autocomplete #auto1="matAutocomplete">
                            <mat-option *ngFor="let options of filteredPerviousOptions | async"
                                [value]="options.driverGradeName" (click)="getPerviousID(options.driverGradeID)">
                                {{options.driverGradeName}}
                            </mat-option>
                        </mat-autocomplete>

                    </mat-form-field>
                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Activation Status</mat-label>
                        <mat-select formControlName="activationStatus">
                            <mat-option [value]=true>Active</mat-option>
                            <mat-option [value]=false>Deleted</mat-option>
                        </mat-select>

                        <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                            Activation Status is required
                        </mat-error>
                    </mat-form-field>

                </div>

            </div>

            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" [type]="submit" *ngIf="saveDisabled" [disabled]="!advanceTableForm.valid"  (click)="confirmAdd()">Save</button>
                        <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                        <button *ngIf="action==='add'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Reset</button>
                        <button *ngIf="action==='edit'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
  </div>
