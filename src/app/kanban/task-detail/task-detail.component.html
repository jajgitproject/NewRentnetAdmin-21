<div class="task-detail-container">
    <div class="detail-header">
        <div class="title-section">
            <span class="type-badge" [ngClass]="data.type.toLowerCase()">{{data.type}}</span>
            <h2 mat-dialog-title>{{data.name}}</h2>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" class="close-btn">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <div mat-dialog-content>
        <div class="task-body">
            <div class="description-section">
                <label>Description</label>
                <p class="description-text">{{data.description || 'No description provided.'}}</p>
            </div>

            <div class="members-section" *ngIf="data.members && data.members.length > 0">
                <label>Assigned Members</label>
                <div class="member-list">
                    <div class="member-item" *ngFor="let member of data.members">
                        <img [src]="member.avatar" class="rounded-circle-avatar-small" [alt]="member.name">
                        <span>{{member.name}}</span>
                    </div>
                </div>
            </div>

            <mat-divider></mat-divider>

            <div class="stats-section">
                <button mat-button class="like-btn" [class.liked]="isLiked" (click)='toggleLike()'>
                    <mat-icon>{{isLiked ? 'favorite' : 'favorite_border'}}</mat-icon>
                    <span>{{data.likes}} Likes</span>
                </button>
                <div class="stat-info">
                    <mat-icon>comment</mat-icon>
                    <span>{{data.comments}} Comments</span>
                </div>
                <div class="stat-info">
                    <mat-icon>bug_report</mat-icon>
                    <span>{{data.bugs || 0}} Bugs</span>
                </div>
            </div>

            <div class="comments-section">
                <label>Comments</label>
                <div class="add-comment">
                    <mat-form-field appearance="outline" class="comment-field" floatLabel="always">
                        <textarea matInput placeholder="Write a comment..." [(ngModel)]="newComment"
                            rows="2"></textarea>
                    </mat-form-field>
                    <button mat-flat-button color="primary" class="post-btn" (click)="addComment()"
                        [disabled]="!newComment.trim()">Post</button>
                </div>

                <div class="comments-list">
                    <div class="comment-item" *ngFor="let comment of data.commentsList">
                        <div class="comment-avatar">
                            <img [src]="comment.avatar" [alt]="comment.user">
                        </div>
                        <div class="comment-content">
                            <div class="comment-header">
                                <span class="user-name">{{comment.user}}</span>
                                <span class="comment-date">{{comment.date | date:'short'}}</span>
                            </div>
                            <p class="comment-msg">{{comment.message}}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
