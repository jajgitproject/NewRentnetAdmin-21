<h2 mat-dialog-title class="dialog-title">Confirm Import</h2>
<mat-dialog-content class="dialog-content">
    <mat-icon class="confirm-icon">warning</mat-icon>
    <p>{{ message }}</p>
</mat-dialog-content>
<mat-dialog-actions class="dialog-actions">
    <button mat-button color="warn" (click)="onNoClick()" class="no-button">No</button>
    <button mat-button color="primary" (click)="onConfirm()" class="yes-button">Yes</button>
</mat-dialog-actions>
