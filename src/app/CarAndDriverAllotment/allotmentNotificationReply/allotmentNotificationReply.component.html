<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        Driver Reply to Allotment No {{AllotmentID}} and Reservation No {{ReservationID}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content style="width: 500px;">
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline">
                        <mat-label>Status</mat-label>
                        <mat-select required #statusVal [class.is-invalid]="statusVal.invalid && statusVal.touched" 
                        formControlName="driverAcceptanceStatus">
                            <mat-option value="Accepted">Accepted</mat-option>
                            <mat-option value="Rejected">Rejected</mat-option>
                            <mat-option value="Pending">Pending</mat-option>
                        </mat-select>
                        <mat-error>
                            Status is required
                        </mat-error>
                    </mat-form-field>
                </div>  

                <div class=" col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline">
                        <mat-label>Remark</mat-label>
                        <input required matInput formControlName="driverAcceptanceRemark" >
                        <mat-error *ngIf="advanceTableForm.get('driverAcceptanceRemark').hasError('required')">
                            Remark is required
                        </mat-error>
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" *ngIf="saveDisabled" [type]="submit" [disabled]="!advanceTableForm.valid"
                         (click)="Put()">Save</button>
                         <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                         <button mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Reset</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
