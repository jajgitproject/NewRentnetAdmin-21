<div *ngFor="let data of advanceTableKC;index as i">
<div class="row" style="margin-left: 20px;margin-top: 20px;">
    <!-- <a style="cursor: pointer;color: #007bff;" (click)="editKAM(i)">
        KAM {{i+1}} - Edit - Delete</a> -->
        <a style="cursor: pointer; color: #007bff;">
            KAM {{i + 1}} -
            <span style="cursor: pointer; color: #007bff;" (click)="editKAM(i)">Edit</span> -
            <span style="cursor: pointer; color: #007bff;" (click)="deleteItem(i)">Delete</span>
        </a>
</div>
        <div class="row" style="margin-left: 20px;margin-top: 20px;">
            <div class="col-xl-3 col-lg-6 col-md-12 col-sm-12 mb-2">
                <span>
                    <b>
                       Employee Name
                    </b>                   
                </span>
                <br/>
                <span>{{data.firstName}} {{data.lastName}}</span>
            </div>

            <div class="col-xl-3 col-lg-6 col-md-12 col-sm-12 mb-2">
                <span>
                    <b>
                        Employee Mobile
                    </b>                   
                </span>
                <br/>
                <span>{{data.mobile}}</span>
            </div>

            <div class="col-xl-3 col-lg-6 col-md-12 col-sm-12 mb-2">
                <span>
                    <b>
                        Employee Email
                    </b>                   
                </span>
                <br/>
                <span>{{data.email}}</span>
            </div>
        </div>
</div>
