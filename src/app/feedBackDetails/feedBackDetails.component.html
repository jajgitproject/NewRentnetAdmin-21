<div class="modalHeader">
  <div class="editRowModal">
    <div class="modalHeader clearfix">
      <div class="modal-about">
        <div class="font-weight-bold p-t-5 font-17">
          {{ dialogTitle }}
        </div>
      </div>
    </div>
  </div>
  <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
    <mat-icon class="small-close-icon">close</mat-icon>
  </button>
</div>
<mat-card>
  <mat-card-content>
    <mat-dialog-content class="of-hidden">
      <ng-container *ngIf="FeedBackDetails && FeedBackDetails.length > 0">
        <div class="row">
          <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
            <span class="TDValueBold">Reservation No</span> <br />
            <span class="TDValue">
              {{ FeedBackDetails[0]?.reservationID || 'N/A' }}
            </span>
          </div>
          <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
            <span class="TDValueBold">Feedback Points</span> <br />
            <span class="TDValue">
              {{ FeedBackDetails[0]?.feedbackPointsOutOfFive || 'N/A' }}
            </span>
          </div>

          <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
            <span class="TDValueBold">Feedback Remark</span> <br />
            <span class="TDValue">
              {{ FeedBackDetails[0]?.feedbackRemark || 'N/A' }}
            </span>
          </div>
        </div>
      </ng-container>
    </mat-dialog-content>
  </mat-card-content>
</mat-card>
