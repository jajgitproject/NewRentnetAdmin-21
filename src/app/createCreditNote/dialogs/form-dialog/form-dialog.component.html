<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Invoice No</mat-label>
                        <input matInput formControlName="invoiceNumberWithPrefix" readonly>
                    </mat-form-field>
                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Branch</mat-label>
                        <input matInput formControlName="branchName" readonly>
                    </mat-form-field>
                </div>
               
            </div>

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Customer</mat-label>
                        <input matInput formControlName="customerName" readonly>
                    </mat-form-field>
                </div>

                 <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Amount</mat-label>
                        <input matInput formControlName="invoiceTotalAmountAfterGST" readonly>
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                 <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Credit Note Amount</mat-label>
                        <input matInput formControlName="creditNoteAmount" 
                                    required 
                                    (input)="calculateTax()">
                        <mat-error *ngIf="advanceTableForm.get('creditNoteAmount').hasError('required')">
                            Please Enter Credit Note Amount
                        </mat-error>
                    </mat-form-field>
                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <span style="color: black;font-size: x-small;">@ {{IGSTPercentage}} %.</span>
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>IGST</mat-label>
                        <input matInput formControlName="igstAmount" readonly>
                    </mat-form-field>
                </div>
                
            </div>

           

        <div class="row">

           <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
            <span style="color: black;font-size: x-small;">@ {{CGSTPercentage}} %.</span>
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>CGST</mat-label>
                        <input matInput formControlName="cgstAmount" readonly>
                    </mat-form-field>
                </div>
                
            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                <span style="color: black;font-size: x-small;">@ {{SGSTPercentage}} %.</span>
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>SGST</mat-label>
                        <input matInput formControlName="sgstAmount" readonly>
                    </mat-form-field>
                </div>
           
        </div>

        <div class="row">  
            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                    <mat-label>Reason</mat-label>
                    <input matInput formControlName="creditNoteReason" required>
                    <mat-error *ngIf="advanceTableForm.get('creditNoteReason').hasError('required')">
                        Reason is required
                    </mat-error>
                </mat-form-field>
            </div> 
            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Requires Re-Billing</mat-label>
                        <mat-select formControlName="requiresReBilling" required>
                            <mat-option [value]=true>Yes</mat-option>
                            <mat-option [value]=false>No</mat-option>
                        </mat-select>
                          <mat-error *ngIf="advanceTableForm.get('requiresReBilling').hasError('required')">
                            Requires Re-Billing is required
                        </mat-error>
                    </mat-form-field>
            </div>                  
        </div>

        <div class="row">
            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                <div class="example-button-row">
                    <button mat-raised-button color="primary" *ngIf="saveDisabled" [type]="submit" [disabled]="!advanceTableForm.valid"  (click)="confirmAdd()">Save</button>
                    <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                   
                </div>
            </div>
        </div>
        </form>
  </div>
