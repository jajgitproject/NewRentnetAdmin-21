<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}} for {{RegistrationNumber}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Reason</mat-label>
                        <input matInput formControlName="statusReason" required>
                        <mat-error *ngIf="advanceTableForm.get('statusReason').hasError('required')">
                            Reason is required
                        </mat-error>
                    </mat-form-field>
                </div>
                    
                        <!-- <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                            <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                                <mat-label>Vehicle</mat-label>
                                <input matInput readonly formControlName="vehicle">
                                <mat-error *ngIf="advanceTableForm.get('vehicle').hasError('required')">
                                    Vehicle Name is required
                                </mat-error>
                            </mat-form-field>
        
                        </div> -->

                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12"  >
                            <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                                <mat-label>Status</mat-label>
                                <mat-select required formControlName="inventoryStatus">
                                    <mat-option value="Active">Active</mat-option>
                                    <mat-option value="On Hold">On Hold</mat-option>
                                    <mat-option value="Exited">Exited</mat-option>
                                </mat-select>
        
                                <mat-error *ngIf="advanceTableForm.get('inventoryStatus').hasError('required')">
                                    Status is required
                                </mat-error>
                            </mat-form-field>
                        </div>
                    
            </div>

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12"  >
                    <mat-label> Supporting Doc</mat-label>
                    <a href="{{ ImagePath }}" target="_blank" *ngIf="ImagePath">
                        <img [src]="ImagePath" class="table " style="height: 80px; width: auto;">
                    </a>
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <app-myupload (onUploadFinished)="uploadFinishedDoc($event)"></app-myupload>
                    </div>
                </div> 
         
                <!-- <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12"  >
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Status</mat-label>
                        <mat-select required formControlName="inventoryStatus">
                            <mat-option value="Active">Active</mat-option>
                            <mat-option value="On Hold">On Hold</mat-option>
                            <mat-option value="Exited">Exited</mat-option>
                        </mat-select>

                        <mat-error *ngIf="advanceTableForm.get('inventoryStatus').hasError('required')">
                            Status is required
                        </mat-error>
                    </mat-form-field>
                </div> -->
            </div>
            
            <div class="row">
                <!-- <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Activation Status</mat-label>
                        <mat-select formControlName="activationStatus">
                            <mat-option [value]=true>Active</mat-option>
                            <mat-option [value]=false>Deleted</mat-option>
                        </mat-select>

                        <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                            Activation Status is required
                        </mat-error>
                    </mat-form-field>
                </div> -->
            </div>
            
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button *ngIf="saveDisabled" color="primary" [type]="submit" [disabled]="!advanceTableForm.valid"  (click)="confirmAdd()">Save</button>
                        <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                        <button *ngIf="action==='add'" mat-raised-button color="warn" (click)="reset()" tabindex="-1">Reset</button>
                        <button *ngIf="action==='edit'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
  </div>
