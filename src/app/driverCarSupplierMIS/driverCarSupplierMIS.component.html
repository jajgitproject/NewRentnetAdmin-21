<section class="content">
    <div class="container-fluid">
        <div class="block-header">
            <div class="row">
                <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                    <ul>
                        <li class="breadcrumb-item bcrumb-1">
                            <a routerLink="/dashboard/main">
                                <i class="fas fa-home"></i> Home</a>|
                            <a href="#" onClick="return false;">Admin</a>|
                            <a href="#" onClick="return false;">
                             Driver Car Supplier MIS</a>
                        </li>
                    </ul>
                    <ul class="breadcrumb breadcrumb-style ">
                        <li class="breadcrumb-item">
                            <h2>Driver Car Supplier MIS</h2>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                <div class="card">
                    <div class="body">
                        <div class="responsive_table">
                            <div class="table-responsive">
                                <div class="materialTableHeader">
                                    <div class="row">
                                        <div style="width: 70%; float:left;padding-top: 6px;padding-left: 12px;">
                                            <!-- <div style="float:left" *ngIf="SearchCustomerGroup"><b>Customer Group</b> : {{SearchCustomerGroup}}</div> -->
                                        </div>
                                        <div style="width: 30%; text-align:right;">
                                            <button mat-raised-button color="primary" data-dismiss="modal" data-toggle="modal" data-backdrop="false" data-target="#exampleModalCenter">
                                                Search
                                            </button>
                                            &nbsp;
                                            &nbsp;
                                            <button mat-mini-fab color="primary" (click)="refresh()">
                                                <mat-icon class="col-white">refresh</mat-icon>
                                            </button>
                                            &nbsp;
                                        </div>
                                    </div>
                                </div>
  
                                <p *ngIf="!dataSource; then thenBlock2 else elseBlock2">
                                    This is not rendered
                                </p>
  
                                <ng-template #thenBlock2>
                                    <div class="alert alert-primary" style="background-color:#E8E8E8; text-align: center;">No Records Found</div>
                                    <div class="body">
                                        <div class="example-button-row">    
                                            <button mat-raised-button color="primary" (click)="PreviousCall()">Previous</button>
                                            <button mat-raised-button color="primary" (click)="NextCall()">Next</button>    
                                        </div>
                                    </div>    
                                </ng-template>
                                <ng-template #elseBlock2>
                                  <div class="scrollable-table-container">
                                  <div style="width: 120%; overflow-y: hidden;">
                                    <mat-table [dataSource]="dataSource" matSort class="mat-cell floating-header-table" (matSortChange)="sortingData($event)">
                                      <ng-container *ngFor="let column of displayedColumns" [matColumnDef]="column">
                                        <mat-header-cell *matHeaderCellDef mat-sort-header>
                                          {{ columnTitleMap[column] || (column | titlecase) }}
                                        </mat-header-cell>
                                        <mat-cell *matCellDef="let row">
                                          <!-- Check for date fields and format them -->
                                          <ng-container *ngIf="column === 'supplierRegistrationDate' || column === 'closeDate'; else defaultCell">
                                            {{ row[column] | date:'dd-MM-yyyy' }}
                                          </ng-container>
                                          <ng-template #defaultCell>
                                            {{ row[column] || 'N/A' }}
                                          </ng-template>
                                        </mat-cell>
                                      </ng-container>
                                      
                                      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                                      <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
                                    </mat-table>
                                  </div>
                                  </div>
  
                                  <div class="body">
                                    <div class="example-button-row">
                                      <button mat-raised-button color="primary" (click)="PreviousCall()">Previous</button>
                                      <button mat-raised-button color="primary" (click)="NextCall()">Next</button>
                                    </div>
                                  </div>
                                </ng-template>
                            </div>
                        </div> 
                    </div>
                </div>
            </div>
        </div>
        
    </div>
  </section>
  
  <div class="modal fade" id="exampleModalCenter" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLongTitle">Driver Car Supplier MIS</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <mat-radio-group [(ngModel)]="selectedOption">
            <mat-radio-button value="driverData" color="primary">Driver Data</mat-radio-button>
            <mat-radio-button value="carData" color="primary">Car Data</mat-radio-button>
            <mat-radio-button value="supplierData" color="primary">Supplier Data</mat-radio-button>
          </mat-radio-group>
        </div>
        <div class="modal-footer">
          <button mat-raised-button color="primary" (click)="onSearch()" data-dismiss="modal">
            Search
          </button>
        </div>
      </div>
    </div>
  </div>
