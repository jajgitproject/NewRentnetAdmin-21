<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                         <div *ngIf="status && status !== 'Changes allow'"
                        style="color:rgb(150, 4, 4); margin-top:5px; font-style: italic;">
                        ({{status}}!!!!!)
                    </div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content style="width: 500px;">
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class=" col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Ticket Number</mat-label>
                        <input  matInput formControlName="ticketNumber" >
                       
                    </mat-form-field>
                    </div>
                    <div class="row">
                        <div class=" col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                            <mat-label>
                                Attachment
                            </mat-label>
                            <br>
                            <a href="{{ ImagePath }}" target="_blank" *ngIf="ImagePath">
                                <img [src]="ImagePath" class="table " style="height: 80px; width: auto;">
                            </a>
            
                            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                <app-myupload (onUploadFinished)="uploadFinished($event)"></app-myupload>
                            </div>
                        </div> 
                    </div>
            </div>
            <div class="row">
                <div class=" col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Email Link</mat-label>
                        <input  matInput formControlName="emailLink" >
                       
                    </mat-form-field>
                    </div> 
                    <div class=" col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                            <mat-label>Booking Edited BY</mat-label>
                            <input  matInput formControlName="bookingEditedBy" >
                           
                        </mat-form-field>
                        </div> 
              </div>
            <div class="row">
                <!-- <div class=" col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Reservation Mode</mat-label>
                        <mat-select formControlName="reservationMode">
                            <mat-option value=Complete>Complete</mat-option>
                            <mat-option value=InComplete>InComplete</mat-option>
                        </mat-select>
                        <!-- <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                            Activation Status is required
                        </mat-error> 
                    </mat-form-field>
                </div>  -->
                <div class=" col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Refernce Number</mat-label>
                        <input  matInput formControlName="referenceNumber" >
                       
                    </mat-form-field>
                    </div>  
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                            <mat-label>Reservation Source</mat-label>
                            <input required type="text" matInput formControlName="reservationSource" [matAutocomplete]="auto13">
                            <mat-autocomplete #auto13="matAutocomplete">
                              <mat-option *ngFor="let option of filteredReservationSourceOptions | async" 
                              [value]="option.reservationSource" (click)="getReservationSourceID(option.reservationSourceID)">
                                {{option.reservationSource}}
                              </mat-option>
                            </mat-autocomplete>
                            <mat-error *ngIf="advanceTableForm.get('reservationSource').hasError('required')">
                                Please Select Reservation Source
                            </mat-error>
                          </mat-form-field>
                    </div> 
            </div>
            <div class="row">
               
                <div class=" col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Reservation Source Detail</mat-label>
                        <input  matInput formControlName="reservationSourceDetail" >
                       
                    </mat-form-field>
                    </div>  
            </div>
         
            <div class="row">
                   <!-- <div class="row" *ngIf="status">
                        <div class="col-12 mb-1">
                          <span style="color:red">{{status}}</span>
                        </div>
                    </div> -->
                <div class=" col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" [type]="submit" [disabled]="!advanceTableForm.valid || buttonDisabled" (click)="confirmAdd()">Save</button>
                        <button mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                        
                    </div>
                </div>
            </div>
        </form>
    </div>
