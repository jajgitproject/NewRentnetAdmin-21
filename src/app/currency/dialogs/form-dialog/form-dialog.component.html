<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
            <mat-icon>close</mat-icon>
        </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Currency</mat-label>
                        <input required matInput formControlName="currencyName">

                        <mat-error *ngIf="advanceTableForm.get('currencyName').hasError('required')">
                            Currency is required
                        </mat-error>
                    </mat-form-field>
                </div>
           
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Currency Code</mat-label>
                        <input required matInput formControlName="currencyCode">

                        <mat-error *ngIf="advanceTableForm.get('currencyCode').hasError('required')">
                            Currency Code is required
                        </mat-error>
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <!-- <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Currency Sign</mat-label>
                        <input matInput formControlName="currencySign">

                        <mat-error *ngIf="advanceTableForm.get('currencySign').hasError('required')">
                            Currency Sign is required
                        </mat-error>
                    </mat-form-field>
                </div> -->
                 
                 <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12"  >
                    <mat-label>Upload Currency Sign</mat-label>
                    <a href="{{ ImagePath }}" target="_blank" *ngIf="ImagePath">
                        <img [src]="ImagePath" class="table " style="height: 80px; width: auto;">
                    </a>
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <app-myupload (onUploadFinished)="uploadFinished($event)"></app-myupload>
                    </div>
                </div> 
             <!-- <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2"> 
                <mat-form-field class="example-full-width mb-3"  appearance="outline"  floatLabel="always">
                    <mat-label>Upload Currency Sign</mat-label>
                   
                    <ngx-mat-file-input (onUploadFinished)="uploadFinished($event)">
                    </ngx-mat-file-input>
                    <mat-icon matSuffix>cloud_upload</mat-icon>
                  </mat-form-field>
            </div> 
                -->
                  
     
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Activation Status</mat-label>
                        <mat-select formControlName="activationStatus">
                            <mat-option [value]=true>Active</mat-option>
                            <mat-option [value]=false>Deleted</mat-option>
                        </mat-select>

                        <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                            Activation Status is required
                        </mat-error>
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" *ngIf="saveDisabled" [type]="submit" [disabled]="!advanceTableForm.valid"
                         (click)="confirmAdd()">Save</button>
                         <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                         <button mat-raised-button color="warn" (click)="onNoClick(action)" tabindex="-1">{{ action === 'add' ? 'Reset' :  'Cancel'}}</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
