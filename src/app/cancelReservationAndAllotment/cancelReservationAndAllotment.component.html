<div class="modalHeader">
  <div class="editRowModal">
    <div class="modalHeader clearfix">
      <div class="modal-about">
        <div class="font-weight-bold p-t-5 font-17">
          {{ dialogTitle }}
        </div>
      </div>
    </div>
  </div>
  <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
    <mat-icon class="small-close-icon">close</mat-icon>
  </button>
</div>
<mat-card>
  <mat-card-content>
    <mat-dialog-content class="of-hidden">
      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <span class="TDValueBold">Cancellation Reason : {{ CancelReservationData.cancellationReason }} </span>
        </div>
      </div>

      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <span class="TDValueBold">Is Cancellation Chargeable : {{ CancelReservationData.isCancellationChargeable === true ? 'Yes' : 'No' }}</span>
        </div>
      </div>

      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <span class="TDValueBold">Attachment : </span>
          <a [href]="CancelReservationData.cancellationProof" target="_blank">
            <img [src]="CancelReservationData.cancellationProof"
                 style="max-width: 200px; cursor: pointer; border: 1px solid #ccc; padding: 5px;" /></a>
        </div>
      </div>
    </mat-dialog-content>
  </mat-card-content>
</mat-card>
