<div class="upload-dialog-container">
    <div class="dialog-header">
        <h2 mat-dialog-title>Upload Files</h2>
        <button mat-icon-button (click)="dialogRef.close()"><mat-icon>close</mat-icon></button>
    </div>

    <mat-dialog-content>
        <div class="drop-zone" [class.dragging]="isDragging" (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)" (drop)="onDrop($event)" (click)="fileInput.click()">
            <mat-icon class="upload-icon">cloud_upload</mat-icon>
            <p>Drag and drop files here or <span>browse</span></p>
            <input type="file" #fileInput multiple (change)="onFileSelected($event)" style="display: none;">
        </div>

        <div class="file-list-preview" *ngIf="files.length > 0">
            <h3>Selected Files ({{files.length}})</h3>
            <div class="file-item" *ngFor="let file of files; let i = index">
                <div class="file-info">
                    <mat-icon>description</mat-icon>
                    <div class="details">
                        <span class="file-name text-truncate">{{file.name}}</span>
                        <span class="file-size">{{file.size / 1024 / 1024 | number:'1.1-2'}} MB</span>
                    </div>
                </div>
                <button mat-icon-button color="warn" (click)="removeFile(i)">
                    <mat-icon>delete_outline</mat-icon>
                </button>
            </div>
        </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button (click)="dialogRef.close()">Cancel</button>
        <button mat-flat-button color="primary" [disabled]="files.length === 0" (click)="uploadFiles()">
            Upload {{files.length}} Files
        </button>
    </mat-dialog-actions>
</div>
