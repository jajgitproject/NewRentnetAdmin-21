<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                         <div *ngIf="status && status !== 'Changes allow'"
                        style="color:rgb(150, 4, 4); margin-top:5px; font-style: italic;">
                        ({{status}}!!!!!)
                    </div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit()">
            <div class="row">
                  <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Geo Search String</mat-label>
                        <input
                        placeholder="Geo Search String"
                        matInput
                        formControlName="reservationStopAddress"
                        ngx-google-places-autocomplete
                        [options]="options"
                        (onAddressChange)="AddressChange($event)"
                        
                        required 
                        />
                    
                       <mat-error *ngIf="
advanceTableForm.get('reservationStopAddress')?.invalid &&
(advanceTableForm.get('reservationStopAddress')?.touched 
 || advanceTableForm.get('reservationStopAddress')?.dirty)">

                            <span *ngIf="advanceTableForm.get('reservationStopAddress')?.hasError('required')">
                                Pickup Address is required
                            </span>

                            <span *ngIf="advanceTableForm.get('reservationStopAddress')?.hasError('invalidPickupAddress')">
                                Please select an address from suggestions
                            </span>

                        </mat-error>

                    </mat-form-field>
                    </div>
            </div>
          
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                       <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                            <mat-label>Address Details</mat-label>
                            <input matInput formControlName="reservationStopAddressDetails" required>
                            <mat-error *ngIf="advanceTableForm.get('reservationStopAddressDetails').hasError('required')">
                                Address Details is required
                            </mat-error>
                        </mat-form-field>
                </div>
            </div>
       
            <div class="row">
                  <!-- <div class="row" *ngIf="status">
                        <div class="col-12 mb-1">
                          <span style="color:red">{{status}}</span>
                        </div>
                    </div> -->
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" type="submit" [disabled]="!advanceTableForm.valid || buttonDisabled"  (click)="Put()">Save</button>
                        <!-- <button *ngIf="action==='add'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Reset</button> -->
                        <button *ngIf="action==='edit'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
