

  <mat-card class="map-card">

    <mat-card-header>
      <mat-card-title>Duty Map</mat-card-title>
      <mat-card-subtitle>Route Preview</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="map-content">
      <img
        *ngIf="mapUrl"
        [src]="mapUrl"
        alt="Duty Slip Map"
        class="map-image"
      />
    </mat-card-content>

  </mat-card>
