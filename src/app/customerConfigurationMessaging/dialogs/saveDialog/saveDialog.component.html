<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        Previous Record will be Deactivated, and <br> New Record will be created in its place </div>
                </div>
            </div>
        </div>   
        <button mat-icon-button (click)="dialog.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
      <div mat-dialog-content>
        <form class="register-form m-4">
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary"
                        (click)="confirmAdd()" >OK</button>
                        <button mat-raised-button (click)="CloseDialog()">Cancel</button>
                    </div>
                </div>
            </div>        
        </form>
    </div>
