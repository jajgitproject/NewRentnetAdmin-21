<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17 dialog-title">
                        Additional KMs And Minutes</div>
                </div>
            </div>
        </div>
        <button mat-icon-button class="dialog-close-btn" (click)="dialogRef.close()" aria-label="Close dialog">
      <span class="small-close-icon" aria-hidden="true">&times;</span>
    </button>
    </div>
    <div mat-dialog-content class="dialog-content">
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class="col-xl-12 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Additional KMs</mat-label>
                        <input required matInput formControlName="additionalKMs">

                        <!-- <mat-error *ngIf="advanceTableForm.get('additionalKMs').hasError('required')">
                            Additional KMs is required
                        </mat-error> -->
                    </mat-form-field>
                </div>
            </div>
          
            <div class="row">
                <div class="col-xl-12 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Additional Minutes</mat-label>
                        <input required matInput formControlName="additionalMinutes">

                        <!-- <mat-error *ngIf="advanceTableForm.get('additionalMinutes').hasError('required')">
                            Additional Minutes is required
                        </mat-error> -->
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <!-- <div *ngIf="isSaveAllowed">
                    <span style="color:red;margin-bottom: 10px;">{{verifyDutyStatusAndCacellationStatus}}</span>
                </div> -->
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" class="save-btn" *ngIf="saveDisabled" [type]="submit" [disabled]="!advanceTableForm.valid || isSaveAllowed"  (click)="Put()">Save</button>
                        <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                        <button *ngIf="action==='add'" mat-raised-button color="warn" (click)="onNoClick()"
                        tabindex="-1">Reset</button>
                        <button *ngIf="action==='edit'" mat-raised-button color="warn" (click)="onNoClick()"
                        tabindex="-1">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
