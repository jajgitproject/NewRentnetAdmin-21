<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}} for {{VendorContractCarCategory}} in {{vendorContractName}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <!-- Hidden fields for required IDs -->
            <input type="hidden" formControlName="vendorContractID">
            <input type="hidden" formControlName="vendorContractCarCategoryID">
            <input type="hidden" formControlName="vendorContractCarCategoriesCarMappingID">

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always"> 
                        <mat-label>Vehicle</mat-label>                       
                        <input required type="text" matInput [matAutocomplete]="auto"
                        formControlName="vehicle" >
                        <mat-autocomplete #auto="matAutocomplete" (optionSelected)="OnVehicleSelect($event.option.value)">
                            <mat-option *ngFor="let options of filteredOptions | async"
                                [value]="options.vehicle" (click)="getVehicle(options.vehicleID)">
                                {{options.vehicle}}
                            </mat-option>
                        </mat-autocomplete>
                        <mat-error *ngIf="advanceTableForm.get('vehicle').hasError('invalidVehicleSelection')">
                            Please select a Vehicle
                        </mat-error>
                    </mat-form-field>
                </div>
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                            <mat-label>Vendor Vehicle Name</mat-label>
                            <input matInput formControlName="vendorVehicleName" required>
                            <mat-error *ngIf="advanceTableForm.get('vendorVehicleName').hasError('required')">
                                Vendor Vehicle Name is required
                            </mat-error>
                        </mat-form-field>
                    </div> 
            </div>                    
            
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Vendor Vehicle Code For Integration</mat-label>
                        <input matInput formControlName="vendorVehicleCodeForIntegration">
                       
                    </mat-form-field>
                </div>

                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                            <mat-label>Activation Status</mat-label>
                            <mat-select formControlName="activationStatus">
                                <mat-option [value]=true>Active</mat-option>
                                <mat-option [value]=false>Deleted</mat-option>
                            </mat-select>
    
                            <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                                Activation Status is required
                            </mat-error>
                        </mat-form-field>
                    </div> 
            </div>   
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button *ngIf="saveDisabled" color="primary" [type]="submit" 
                                [disabled]="!canSave()" 
                                (click)="confirmAdd()">Save</button>
                        <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                        <button mat-raised-button color="warn" (click)="onNoClick(action)" tabindex="-1">{{ action === 'add' ? 'Reset' :  'Cancel'}}</button>
                    </div>
                </div>
            </div>
        </form>
  </div>
