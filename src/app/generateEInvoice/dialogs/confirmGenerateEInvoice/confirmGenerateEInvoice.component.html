<div class="container" *ngIf="action === 'generate'">
  <h2 mat-dialog-title>Generate E-Invoice</h2>
  <h3 mat-dialog-title>Are you sure, you want to generate this E-Invoice?</h3>
  <div mat-dialog-actions class="mb-1">
    <button mat-flat-button color="warn" [mat-dialog-close]="1" (click)="GenerateEInvoice()">
      Yes
    </button>
    <button mat-flat-button (click)="onNoClick()" tabindex="-1">Cancel</button>
  </div>
</div>


<div class="container" *ngIf="action === 'cancel'">
  <h2 mat-dialog-title>Cancel E-Invoice</h2>
  <h3 mat-dialog-title>Are you sure, you want to cancel this E-Invoice?</h3>
  <div mat-dialog-actions class="mb-1">
    <button mat-flat-button color="warn" [mat-dialog-close]="1" (click)="CancelEInvoice()">
      Yes
    </button>
    <button mat-flat-button (click)="onNoClick()" tabindex="-1">Cancel</button>
  </div>
</div>
