<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
            <mat-icon>close</mat-icon>
        </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Package Type</mat-label>
                        <input matInput formControlName="packageType" (keypress)="keyPressAlphaNumeric($event)"
                            required>
                        <mat-error *ngIf="advanceTableForm.get('packageType').hasError('required')">
                            Package Type is required
                        </mat-error>
                    </mat-form-field>
                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <!-- <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                            <mat-label>Service Type</mat-label>
                             <mat-select required #serviceTypeVal [class.is-invalid]="serviceTypeVal.invalid && serviceTypeVal.touched" formControlName="serviceTypeID">
                                <mat-option [value]="ServiceType.serviceTypeID" *ngFor="let ServiceType of ServiceTypeList">{{ServiceType. serviceType}}</mat-option>
                            </mat-select>
                            <mat-error>
                                Please select a Service Type
                            </mat-error>
                        </mat-form-field> -->

                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Service Type</mat-label>
                        <input type="text" matInput [formControl]="searchServiceType" [matAutocomplete]="auto">
                        <mat-autocomplete #auto="matAutocomplete">
                            <mat-option *ngFor="let option of filteredServiceTypeOptions | async"
                                [value]="option.serviceType" (click)="getTitles(option.serviceTypeID)">
                                {{option.serviceType}}
                            </mat-option>
                        </mat-autocomplete>
                    </mat-form-field>
                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>OldRentNetDuty_Type</mat-label>
                        <input matInput formControlName="oldRentNetDuty_Type">
                        <!-- <mat-error *ngIf="advanceTableForm.get('oldRentNetDuty_Type').hasError('required')">
                            OldRentNetDuty_Type is required
                        </mat-error> -->
                    </mat-form-field>
                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Activation Status</mat-label>
                        <mat-select formControlName="activationStatus">
                            <mat-option [value]=true>Active</mat-option>
                            <mat-option [value]=false>Deleted</mat-option>
                        </mat-select>

                        <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                            Activation Status is required
                        </mat-error>
                    </mat-form-field>
                </div>
            </div>




            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" [type]="submit" [disabled]="!advanceTableForm.valid"
                            (click)="confirmAdd()">Save</button>
                        <button *ngIf="action==='add'" mat-raised-button color="warn" (click)="onNoClick()"
                            tabindex="-1">Reset</button>
                        <button *ngIf="action==='edit'" mat-raised-button color="warn" (click)="onNoClick()"
                            tabindex="-1">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
