<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class="col-xl-12 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Supplier Name</mat-label>
                        <input required matInput formControlName="supplierName">

                        <mat-error *ngIf="advanceTableForm.get('supplierName').hasError('required')">
                            Supplier Name is required
                        </mat-error>
                    </mat-form-field>
                </div>
                <div class="col-xl-12 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Status</mat-label>
                        <mat-select formControlName="supplierVerificationStatus">
                            <mat-option value="Approved">Approved</mat-option>
                            <mat-option value="Rejected">Rejected</mat-option>
                            <mat-option value="On Hold">On Hold</mat-option>
                            <!-- <mat-option value="Exited">Exited</mat-option> -->
                        </mat-select>

                        <mat-error *ngIf="advanceTableForm.get('supplierVerificationStatus').hasError('required')">
                            Supplier Verification Status is required
                        </mat-error>
                    </mat-form-field>
                </div>
            </div>
          
            <div class="row">
                
                <div class="col-xl-12 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Remark</mat-label>
                        <input required  matInput formControlName="supplierVerificationStatusRemark">
                        <mat-error *ngIf="advanceTableForm.get('supplierVerificationStatusRemark').hasError('required')">
                            Remark is required
                        </mat-error>
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <!-- <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" [type]="submit" [disabled]="!advanceTableForm.valid"  (click)="confirmAdd()">Save</button>
                        <button *ngIf="action==='add'" mat-raised-button color="warn" (click)="onNoClick()"
                        tabindex="-1">Reset</button>
                    <button *ngIf="action==='edit'" mat-raised-button color="warn" (click)="onNoClick()"
                        tabindex="-1">Cancel</button>

                        <button mat-raised-button color="primary"  (click)="openViewUploadedDocument()">View Uploaded Document</button>
                        <button mat-raised-button color="primary"   (click)="openViewRequiredDocument()">View Required Document</button>
                    </div>
                </div> -->
                <div class="example-button-row">
                    <!-- Save Button -->
                    <button mat-raised-button color="primary" [type]="submit" [disabled]="!advanceTableForm.valid || isLoading" (click)="confirmAdd()">
                      <!-- Spinner inside button when loading -->
                      <span *ngIf="!isLoading">Save</span>
                      <mat-spinner *ngIf="isLoading" diameter="20" [diameter]="20"></mat-spinner>
                    </button>
                  
                    <!-- Reset Button (only visible when action is 'add') -->
                    <button *ngIf="action === 'add'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Reset</button>
                  
                    <!-- Cancel Button (only visible when action is 'edit') -->
                    <button *ngIf="action === 'edit'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                  </div>
                  
            </div>
        </form>
    </div>
