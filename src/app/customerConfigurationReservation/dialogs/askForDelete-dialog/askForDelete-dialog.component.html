<div class="container">
  <h2 mat-dialog-title>Record once deleted can't be reactivated again <br>Are you sure you want to delete this record?</h2>
  <div mat-dialog-actions class="mb-1">
    <button mat-flat-button color="primary" (click)="confirmDelete()">
      OK
    </button>
    <button mat-flat-button (click)="onNoClick()" tabindex="-1">Cancel</button>
  </div>
</div>
