<section class="content">
    <div class="container-fluid">
        <div class="block-header">
            <div class="row">
                <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                    <ul>
                        <li class="breadcrumb-item bcrumb-1">
                            <a routerLink="/dashboard/main">
                                <i class="fas fa-home"></i> Home</a>|
                            <a href="#" onClick="return false;">Admin</a>|
                            <a href="#" onClick="return false;">KAMDetails</a>
                        </li>
                    </ul>
                    <ul class="breadcrumb breadcrumb-style ">
                        <li class="breadcrumb-item">
                            <h2>KAMDetails</h2>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                <div class="card">
                    <div class="body">
                        <div class="responsive_table">
                            <div class="materialTableHeader">
                                <div class="row">
                                    <div class="col-12">
                                        <ul class="header-buttons-left ml-0">
                                            <li class="dropdown">
                                                <h2>
                                                    <strong>Search</strong></h2>
                                            </li>
                                            <li class="dropdown m-l-10  mr-10">
                                                <input placeholder="KamDetails" [(ngModel)]="SearchKamDetails" type="text" class="browser-default search-field" aria-label="Search box">

                                            </li>
                                            <li class="dropdown m-l-10  mr-10">
                                                <mat-form-field appearance="outline" floatLabel="always" class="example-full-width mb-3">
                                                    <mat-label>Activation Status</mat-label>
                                                    <mat-select [(value)]="SearchActivationStatus">
                                                        <mat-option value="Active">Active</mat-option>
                                                        <mat-option value="Deleted">Deleted</mat-option>
                                                    </mat-select>
                                                </mat-form-field>
                                            </li>

                                            <li class="dropdown m-l-10  mr-10">
                                                <button type="button" class="btn btn-outline-primary" (click)="Filter()">Filter</button>
                                            </li>
                                        </ul>
                                    </div>
                                    <div class="col-12">
                                        <ul class="header-buttons">
                                            <li>
                                                <div class="icon-button-demo">
                                                    <button mat-mini-fab color="primary" (click)="addNew()">
                            <mat-icon class="col-white">add</mat-icon>
                          </button>
                                                </div>
                                            </li>
                                            <li>
                                                <div class="icon-button-demo">
                                                    <button mat-mini-fab color="primary" (click)="refresh()">
                            <mat-icon class="col-white">refresh</mat-icon>
                          </button>
                                                </div>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>

                            
                            <p *ngIf="!dataSource; then thenBlock2 else elseBlock2">
                                This is not rendered
                            </p>

                            <ng-template #thenBlock2>
                                <div class="alert alert-primary" style="background-color:#E8E8E8; text-align: center;">No Records Found</div>
                                <div class="body">
                                    <div class="example-button-row">
    
                                        <button mat-raised-button color="primary" (click)="PreviousCall()">Previous</button>
                                        <button mat-raised-button color="primary" (click)="NextCall()">Next</button>
    
                                    </div>
                                </div>
    
                            </ng-template>

                            <ng-template #elseBlock2>
                                <div class="scrollable-table-container">
                            <mat-table #table [dataSource]="dataSource" matSort class="mat-cell floating-header-table" (matSortChange)="SortingData($event)">
                                <ng-container matColumnDef="id">
                                    <mat-header-cell *matHeaderCellDef mat-sort-header>Id</mat-header-cell>
                                    <mat-cell *matCellDef="let row">{{row.kamDetailsID}}</mat-cell>
                                </ng-container>

                                <ng-container matColumnDef="kamDetails">
                                    <mat-header-cell *matHeaderCellDef mat-sort-header>Kam Details</mat-header-cell>
                                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                        {{row.kamDetails}}</mat-cell>
                                </ng-container>

                                <ng-container matColumnDef="activationStatus">
                                    <mat-header-cell *matHeaderCellDef mat-sort-header>Activation Status</mat-header-cell>
                                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                        {{row.activationStatus}}</mat-cell>
                                </ng-container>
                                <!-- actions -->
                                <ng-container matColumnDef="actions">
                                    <mat-header-cell *matHeaderCellDef class="pr-0" [ngClass]="'tbl-col-width-per-9'">Actions</mat-header-cell>
                                    <mat-cell *matCellDef="let row; let i=index;" class="pr-0" [ngClass]="'tbl-col-width-per-9'">
                                        <button mat-raised-button color="primary" (contextmenu)="onContextMenu($event, row)" (click)="onContextMenu($event, row)">
                                            Actions
                                    </button>
                                    </mat-cell>
                                </ng-container>
                                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                                <mat-row *matRowDef="let row; columns: displayedColumns;" [style.cursor]="'pointer'" matRipple>
                                </mat-row>
                            </mat-table>
                            </div>
                            <!-- Loading spinner -->
                            <!-- <div *ngIf="exampleDatabase.isTblLoading" class="tbl-spinner">
                                <mat-progress-spinner color="primary" [diameter]="40" mode="indeterminate">
                                </mat-progress-spinner>
                            </div> -->

                            <!-- context menu start -->
                            <div style="visibility: hidden; position: fixed" [style.left]="contextMenuPosition.x" [style.top]="contextMenuPosition.y" [matMenuTriggerFor]="contextMenu">
                            </div>
                            <mat-menu #contextMenu="matMenu">
                                <ng-template matMenuContent let-item="item">
                                    <!-- <button mat-menu-item (click)="addNew()">
                    <mat-icon>add_box</mat-icon>
                    <span>Add</span>
                  </button> -->
                                    <button mat-menu-item (click)="editCall(item)">
                    <mat-icon>create</mat-icon>
                    <span>Edit</span>
                  </button>
                                    <button mat-menu-item (click)="deleteItem(item)">
                    <mat-icon>delete</mat-icon>
                    <span>Delete</span>
                  </button>
                                  


                                </ng-template>
                            </mat-menu>

                            <!-- context menu end -->

                            <!-- <div *ngIf="!exampleDatabase.isTblLoading" class="no-results" [style.display]="dataSource.renderedData.length == 0 ? '' : 'none'">
                                No results
                            </div> -->

                            <div class="body">
                                <div class="example-button-row">

                                    <button mat-raised-button color="primary" (click)="PreviousCall()">Previous</button>
                                    <button mat-raised-button color="primary" (click)="NextCall()">Next</button>

                                </div>
                            </div>

                        </ng-template>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
