<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}} For <b>{{reservationID}}</b>
                 </div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Action Date</mat-label>
                        <input [disabled]="disableDateTime" matInput [matDatepicker]="disputeDate" placeholder="DD/MM/YYYY"
                          formControlName="actionTakenDate">
                        <!-- <mat-datepicker-toggle matSuffix [for]="disputeDate"></mat-datepicker-toggle> -->
                        <mat-datepicker #disputeDate></mat-datepicker>
                      </mat-form-field>

                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Action Time</mat-label>
                        <input [disabled]="disableDateTime" required matInput [owlDateTimeTrigger]="time1" [owlDateTime]="time1"
                          formControlName="actionTakenTime" >
                        <!-- <button mat-icon-button matSuffix type="button" [owlDateTimeTrigger]="time1" class="date-icon" aria-label="Open time picker"><mat-icon>schedule</mat-icon></button> -->
                        <owl-date-time [pickerType]="'timer'" #time1></owl-date-time>
                        <mat-error *ngIf="advanceTableForm.get('actionTakenTime').hasError('required')">
                          Action Time is required
                        </mat-error>
                      </mat-form-field>
                </div>
            </div>

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Action Taken</mat-label>
                        <input matInput  formControlName="actionTaken" required>
                        <mat-error *ngIf="advanceTableForm.get('actionTaken').hasError('required')">
                            Action Taken is required
                        </mat-error>
                    </mat-form-field>

                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Activation Status</mat-label>
                        <mat-select formControlName="activationStatus">
                            <mat-option [value]=true>Active</mat-option>
                            <mat-option [value]=false>Deleted</mat-option>
                        </mat-select>

                        <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                            Activation Status is required
                        </mat-error>
                    </mat-form-field>
                </div>
            </div>    
            
            <div class="row">
                <span style="color:red;margin-bottom: 10px;">{{verifyDutyStatusAndCacellationStatus}}</span>
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <!-- Save Button with Spinner -->
                        <button mat-raised-button color="primary" [disabled]="!advanceTableForm.valid || isLoading || isSaveAllowed" (click)="confirmAdd()">
                            <ng-container *ngIf="!isLoading">Save</ng-container>
                            <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
                        </button>
            
                        <!-- Reset Button (only in 'add' mode) -->
                        <button *ngIf="action === 'add'" mat-raised-button color="warn" (click)="reset()" tabindex="-1">Reset</button>
            
                        <!-- Cancel Button (only in 'edit' mode) -->
                        <button *ngIf="action === 'edit'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
  </div>
