<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Package</mat-label>
                        <input matInput formControlName="package" required  >
                        <mat-error *ngIf="advanceTableForm.get('package').hasError('required')">
                            Package is required
                        </mat-error>
                    </mat-form-field>
                    </div>
               
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <!-- <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                            <mat-label>Package Type</mat-label>
                             <mat-select required #packageTypeVal [class.is-invalid]="packageTypeVal.invalid && packageTypeVal.touched" formControlName="packageTypeID">
                                <mat-option [value]="PackageType.packageTypeID" *ngFor="let PackageType of PackageList">{{PackageType. packageType}}</mat-option>
                            </mat-select>
                            <mat-error>
                                Please select a Package Type
                            </mat-error>
                        </mat-form-field> -->

                        <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                            <mat-label>Package Type</mat-label>
                            <input type="text" matInput required formControlName="packageType" [matAutocomplete]="auto">
                            <mat-autocomplete #auto="matAutocomplete" (optionSelected)="onPackageTypeSelected($event.option.value)">
                              <mat-option *ngFor="let option of filteredPackageTypeOptions | async" [value]="option.packageType" (click)="getTitles(option.packageTypeID)">
                                {{option.packageType}}
                              </mat-option>
                            </mat-autocomplete>
                            <mat-error *ngIf="advanceTableForm.controls['packageType'].hasError('packageTypeInvalid')">
                           Please select a Package Type
                            </mat-error>
                          </mat-form-field>
                    </div>
            </div>
            <div class="row">
               <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>OldRentNetPackage</mat-label>
                        <input matInput formControlName="oldRentNetPackage"  >
                        <!-- <mat-error *ngIf="advanceTableForm.get('oldRentNetPackage').hasError('required')">
                            OldRentNetPackage is required
                        </mat-error> -->
                    </mat-form-field>
                    </div>
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                            <mat-label>Activation Status</mat-label>
                            <mat-select formControlName="activationStatus">
                                <mat-option [value]=true>Active</mat-option>
                                <mat-option [value]=false>Deleted</mat-option>
                            </mat-select>
    
                            <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                                Activation Status is required
                            </mat-error>
                        </mat-form-field>
                    </div> 
            </div>
           
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                      <button mat-raised-button 
                              color="primary" 
                              [disabled]="!advanceTableForm.valid || isLoading"
                              (click)="confirmAdd()">
                        <mat-spinner *ngIf="isLoading" diameter="20" class="spinner"></mat-spinner>  <!-- Spinner for loading -->
                        <span *ngIf="!isLoading">Save</span>  <!-- Text when not loading -->
                      </button>
                  
                      <button *ngIf="action === 'add'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Reset</button>
                      <button *ngIf="action === 'edit'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                    </div>
                  </div>
                  
            </div>
        </form>
  </div>
