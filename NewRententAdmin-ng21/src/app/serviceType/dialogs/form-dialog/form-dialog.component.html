<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Service Type</mat-label>
                        <input matInput formControlName="serviceType" required  >
                        <mat-error *ngIf="advanceTableForm.get('serviceType').hasError('required')">
                            Service Type is required
                        </mat-error>
                    </mat-form-field>
                    </div>
               
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                            <mat-label>Activation Status</mat-label>
                            <mat-select formControlName="activationStatus">
                                <mat-option [value]=true>Active</mat-option>
                                <mat-option [value]=false>Deleted</mat-option>
                            </mat-select>
    
                            <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                                Activation Status is required
                            </mat-error>
                        </mat-form-field>
                    </div> 
            </div>
  
            <div class="row">
                <div class="example-button-row">
                    <!-- Save button -->
                    <button mat-raised-button 
                            color="primary" 
                            [disabled]="isLoading"
                            (click)="confirmAdd()">
                      <mat-spinner *ngIf="isLoading" diameter="20" class="spinner"></mat-spinner>
                      <span *ngIf="!isLoading">Save</span>
                    </button>
                  
                    <!-- Reset button -->
                    <button *ngIf="action === 'add'" 
                            mat-raised-button color="warn" 
                            (click)="onNoClick()" 
                            tabindex="-1" 
                            [disabled]="isLoading">Reset</button>
                  
                    <!-- Cancel button -->
                    <button *ngIf="action === 'edit'" 
                            mat-raised-button color="warn" 
                            (click)="onNoClick()" 
                            tabindex="-1" 
                            [disabled]="isLoading">Cancel</button>
                  </div>
                  
            </div>
        </form>
  </div>
