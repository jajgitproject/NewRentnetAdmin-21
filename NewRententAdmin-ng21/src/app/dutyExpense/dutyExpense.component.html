<div class="row">
    <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="card">
            <div class="body">
                <div class="responsive_table">            
                        <mat-table #table [dataSource]="advanceTableDE" matSort>
                            <ng-container matColumnDef="id">
                                <mat-header-cell *matHeaderCellDef mat-sort-header>Id</mat-header-cell>
                                <mat-cell *matCellDef="let row">{{row.dutyExpenseID}}</mat-cell>
                            </ng-container>

                            <ng-container matColumnDef="expense">
                                <mat-header-cell *matHeaderCellDef mat-sort-header>Expense Name</mat-header-cell>
                                <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                    {{row.expense}}</mat-cell>
                            </ng-container>

                            <ng-container matColumnDef="chargeableOrNonChargeable">
                                <mat-header-cell *matHeaderCellDef mat-sort-header><span matTooltip="Chargeable / NonChargeable" matTooltipPosition="above">Charg / NonCharg</span></mat-header-cell>
                                <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                    {{row.chargeableOrNonChargeable}}</mat-cell>
                            </ng-container>

                            <ng-container matColumnDef="uomUnits">
                                <mat-header-cell *matHeaderCellDef mat-sort-header> Unit</mat-header-cell>
                                <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                    {{row.uomUnits}}</mat-cell>
                            </ng-container>

                            <ng-container matColumnDef="amountPerUnit">
                                <mat-header-cell *matHeaderCellDef mat-sort-header>Amount Per Unit</mat-header-cell>
                                <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                    {{row.amountPerUnit}}</mat-cell>
                            </ng-container>

                            <ng-container matColumnDef="amount">
                                <mat-header-cell *matHeaderCellDef mat-sort-header>Amount</mat-header-cell>
                                <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                    {{row.amount}}</mat-cell>
                            </ng-container>

                            <ng-container matColumnDef="status">
                                <mat-header-cell *matHeaderCellDef>Activation Status</mat-header-cell>
                                <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                    {{row.activationStatus===true ? 'Active' : 'Deleted'}}</mat-cell>
                            </ng-container>

                            <!-- actions -->
                            <ng-container matColumnDef="actions">
                                <mat-header-cell *matHeaderCellDef class="pr-0" [ngClass]="'tbl-col-width-per-9'">Actions</mat-header-cell>
                                <mat-cell *matCellDef="let row; let i=index;" class="pr-0" [ngClass]="'tbl-col-width-per-9'">
                                    <button mat-raised-button color="primary" (contextmenu)="onContextMenu($event, row)" (click)="onContextMenu($event, row)">
                                        Actions
                                </button>
                                </mat-cell>
                            </ng-container>
                            <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                            <mat-row *matRowDef="let row; columns: displayedColumns;" [style.cursor]="'pointer'" matRipple>
                            </mat-row>
                        </mat-table>
                        
                   
                        <!-- context menu start -->
                        <div style="visibility: hidden; position: fixed" [style.left]="contextMenuPosition.x" [style.top]="contextMenuPosition.y" [matMenuTriggerFor]="contextMenu">
                        </div>
                        <mat-menu #contextMenu="matMenu">
                            <ng-template matMenuContent let-item="item">
                                <button mat-menu-item (click)="editCall(item)">
                                <mat-icon>create</mat-icon>
                                <span>Edit</span>
                                </button>
                                <button *ngIf="shouldShowDeleteButton(item)" mat-menu-item (click)="deleteItem(item)">
                                <mat-icon>delete</mat-icon>
                                <span>Delete</span>
                                </button>
                            </ng-template>
                        </mat-menu>
                </div>
            </div>
        </div>
    </div>
</div>
