    <div class="modalHeader">
      <div class="editRowModal">
        <div class="modalHeader clearfix" >
          <div class="modal-about">
            <div class="font-weight-bold p-t-5 font-17" >
              {{customerName}}'s {{ dialogTitle }}
            </div>
          </div>
        </div>
      </div>
      <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
        <mat-icon class="small-close-icon">close</mat-icon>
      </button>
    </div>

    <!-- <div *ngIf="!dataSource" class="alert alert-primary" style="background-color:#E8E8E8; text-align: center;width: 100%;margin-top: 10px;">
      No Record To Display...
  </div> -->
  <ng-container *ngIf="dataSource !== undefined">
    <mat-dialog-content class="mat-typography">
    <ng-container  *ngFor="let customerAlert of dataSource" >
    <mat-card >
      <mat-card-content>
        
          <div class="row">
            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
              <!-- <span class="TDValueBold">Alert Message</span>  -->
              <span class="TDValue" style="width: 100px;">{{customerAlert.customerAlertMessage }}</span>
            </div>
            
          </div>
      
      </mat-card-content>
    </mat-card>
    <br>
    
  </ng-container>
  <button mat-raised-button color="primary"  (click)="dialogRef.close()">OK</button>
</mat-dialog-content>
</ng-container>
  <mat-progress-bar
    mode="indeterminate"
    *ngIf="isLoading"
  ></mat-progress-bar>
