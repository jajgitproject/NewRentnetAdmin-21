<div class="modalHeader">
  <div class="editRowModal">
    <div class="modalHeader clearfix">
      <div class="modal-about">
        <div class="font-weight-bold p-t-5 font-17">
          {{ dialogTitle }}
        </div>
      </div>
    </div>
  </div>
  <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
    <mat-icon>close</mat-icon>
  </button>
</div>
<mat-card>
  <mat-card-content>
    <mat-dialog-content class="of-hidden">
      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <span class="TDValueBold">Package</span> <br />
          <span class="TDValue">{{ packageInfo.package.package }}</span>
        </div>
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <span class="TDValueBold">Package Type</span> <br />
          <span class="TDValue">{{ packageInfo.package.packageType }}</span>
        </div>
      </div>

      <div class="row">
        <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
          <span class="TDValueBold"> Service Type </span> <br />
          <span class="TDValue">{{ packageInfo.package.serviceType }}</span>
        </div>
      </div>
    </mat-dialog-content>
  </mat-card-content>
</mat-card>
