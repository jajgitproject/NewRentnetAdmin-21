<div class="modalHeader">
  <div class="editRowModal">
    <div class="modalHeader clearfix">
      <div class="modal-about">
        <div class="font-weight-bold p-t-5 font-17">
          {{ dialogTitle }}
        </div>
      </div>
    </div>
  </div>
  <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
    <mat-icon class="small-close-icon">close</mat-icon>
  </button>
</div>
<mat-card>
  <mat-card-content>
    <mat-dialog-content class="of-hidden">
      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <span class="TDValueBold">Date</span> <br />
          <span class="TDValue"> {{ (NextDayInstructionDetails[0]?.nextDayInstructionDate | date: 'yyyy-MM-dd') || 'N/A'   }}</span> 
        </div>
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <span class="TDValueBold">Time</span> <br />
          <span class="TDValue">{{ (NextDayInstructionDetails[0]?.nextDayInstructionTime | date: 'shortTime') || 'N/A' }}</span>
        </div>
      </div>
      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <span class="TDValueBold">Instruction</span> <br />
           <span class="TDValue">{{ NextDayInstructionDetails[0]?.nextDayInstruction  || 'N/A' }}</span> 
        </div>
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <!-- <span class="TDValueBold">Car Reg No</span> <br />
          <span class="TDValue"> {{ NextDayInstructionDetails?.row?.registrationNumber || 'N/A' }}</span> -->
        </div>
      </div>
      <!-- <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <span class="TDValueBold"> Email</span> <br />
          <span class="TDValue"> {{ NextDayInstructionDetails.primaryEmail }}</span>
        </div>
      </div> -->
    </mat-dialog-content>
  </mat-card-content>
</mat-card>
