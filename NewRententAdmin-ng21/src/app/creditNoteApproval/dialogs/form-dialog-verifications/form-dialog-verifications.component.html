<div class="addContainer">
  <div class="modalHeader">
    <div class="modal-about">
      <div class="font-weight-bold font-17">
         {{dialogTitle}} {{creditNoteNumber ? '- ' + creditNoteNumber : ''}}
      </div>
    </div>
    <button mat-icon-button (click)="onNoClick()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div mat-dialog-content>
    <form class="register-form" [formGroup]="advanceTableForm" (ngSubmit)="confirmAdd()">

      <!-- Row 1: Customer & Invoice -->
      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <mat-form-field appearance="outline" class="example-full-width" floatLabel="always">
            <mat-label>Customer</mat-label>
            <input readonly matInput formControlName="customerName">
          </mat-form-field>
        </div>

        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <mat-form-field appearance="outline" class="example-full-width" floatLabel="always">
            <mat-label>Invoice No</mat-label>
            <input readonly matInput formControlName="invoiceNumberWithPrefix">
          </mat-form-field>
        </div>
      </div>

      <!-- Row 2: Date & Amount -->
      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
            <mat-label>Date</mat-label>
            <input matInput [value]="advanceTableForm.get('dateTimeOfGeneration')?.value | date:'dd-MMM-yyyy'" readonly>
          </mat-form-field>
        </div>

        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <mat-form-field appearance="outline" class="example-full-width" floatLabel="always">
            <mat-label>Amount</mat-label>
            <input readonly matInput type="number" formControlName="creditNoteAmount">
          </mat-form-field>
        </div>
      </div>

      <!-- Row 3: Approval Status & Reason -->
      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <mat-form-field appearance="outline" class="example-full-width" floatLabel="always">
            <mat-label>Approval Status</mat-label>
            <mat-select formControlName="approvalStatus" required>
              <mat-option value="Approved">Approved</mat-option>
              <mat-option value="Rejected">Rejected</mat-option>
              <mat-option value="Pending">Pending</mat-option>
            </mat-select>
            <mat-error *ngIf="advanceTableForm.get('approvalStatus')?.hasError('required')">
              Approval Status is required
            </mat-error>
          </mat-form-field>
        </div>

        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <mat-form-field appearance="outline" class="example-full-width" floatLabel="always">
            <mat-label>Reason</mat-label>
            <input matInput formControlName="approvalRejectionReason" placeholder="Enter reason">
          </mat-form-field>
        </div>
      </div>

      <!-- Row 4: Date & Time -->
      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <mat-form-field appearance="outline" class="example-full-width" floatLabel="always">
            <mat-label>Date</mat-label>
            <input readonly matInput [matDatepicker]="approvalDatePicker" formControlName="approvalDateTime" [disabled]="true">
            <mat-datepicker-toggle matSuffix [for]="approvalDatePicker"></mat-datepicker-toggle>
            <mat-datepicker #approvalDatePicker></mat-datepicker>
          </mat-form-field>
        </div>

        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
             <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Time</mat-label>
                        <input readonly matInput [owlDateTimeTrigger]="time2" [owlDateTime]="time2"
                            formControlName="approvalDateTime" [disabled]="isDisabled">
                        <mat-icon matSuffix [owlDateTimeTrigger]="time2" class="date-icon">schedule</mat-icon>
                        <owl-date-time [pickerType]="'timer'" #time2></owl-date-time>

                        <mat-error *ngIf="advanceTableForm.get('approvalDateTime').hasError('required')">
                           Time is required
                        </mat-error>
                    </mat-form-field>

        </div>
      </div>

      <!-- Row 5: Approved By -->
      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
          <mat-form-field appearance="outline" class="example-full-width" floatLabel="always">
            <mat-label>Approved By</mat-label>
            <input readonly matInput formControlName="approvedBy">
          </mat-form-field>
        </div>
      </div>

      <!-- Buttons -->
      <div class="row">
        <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
          <div class="example-button-row">
            <button mat-raised-button color="primary" type="submit"
              [disabled]="saveDisabled" style="margin-right: 10px;">Save</button>
            <button mat-raised-button color="warn" (click)="onNoClick()">Cancel</button>
          </div>
        </div>
      </div>

    </form>
  </div>
</div>
