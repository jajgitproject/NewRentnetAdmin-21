<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Invoice Template Name</mat-label>
                        <input required matInput formControlName="invoiceTemplateName">

                        <mat-error *ngIf="advanceTableForm.get('invoiceTemplateName').hasError('required')">
                            Invoice Template Name is required
                        </mat-error>
                    </mat-form-field>
                </div>
                 <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                  <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Template Type</mat-label>
                        <mat-select required #templateTypeOnVal
                            [class.is-invalid]="templateTypeOnVal.invalid && templateTypeOnVal.touched"
                            formControlName="templateType">
                            <mat-option value="InvoiceSingleDuty">InvoiceSingleDuty</mat-option>
                            <mat-option value="InvoiceMutipleDuty">InvoiceMutipleDuty</mat-option>
                        </mat-select>
                        <mat-error>Template Type is required</mat-error>
                    </mat-form-field>
                 </div>
                <!-- <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Address</mat-label>
                        <input required matInput formControlName="address">

                        <mat-error *ngIf="advanceTableForm.get('address').hasError('required')">
                            Address is required
                        </mat-error>
                    </mat-form-field>
                </div> -->
            </div>
          
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Template Address</mat-label>
                        <input required matInput formControlName="address">

                        <mat-error *ngIf="advanceTableForm.get('address').hasError('required')">
                           Template Address is required
                        </mat-error>
                    </mat-form-field>
                </div>
               <!-- <div class=" col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-label>
                       Template Address
                    </mat-label>
                    <br>
                    <a href="{{ ImagePath1 }}" target="_blank" *ngIf="ImagePath1">
                        <img [src]="ImagePath1" class="table " style="height: 80px; width: auto;">
                    </a>
    
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <app-myupload (onUploadFinished)="FlagIcon($event)"></app-myupload>
                    </div>
                </div>  -->
                <div class=" col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                   <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Activation Status</mat-label>
                        <mat-select formControlName="activationStatus">
                            <mat-option [value]=true>Active</mat-option>
                            <mat-option [value]=false>Deleted</mat-option>
                        </mat-select>

                        <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                            Activation Status is required
                        </mat-error>
                    </mat-form-field>
                </div> 
            </div>
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <!-- Save Button (Hidden when saving) -->
                        <button 
                            mat-raised-button 
                            *ngIf="saveDisabled"  
                            color="primary" 
                            type="submit"
                            [disabled]="!advanceTableForm.valid"  
                            (click)="confirmAdd()">Save</button>
                        
                        <!-- Spinner (Visible while saving) -->
                        <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                    
                        <!-- Reset & Cancel Buttons -->
                        <button *ngIf="action === 'add'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Reset</button>
                        <button *ngIf="action === 'edit'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                    </div>
                    
                </div>
            </div>
        </form>
    </div>
