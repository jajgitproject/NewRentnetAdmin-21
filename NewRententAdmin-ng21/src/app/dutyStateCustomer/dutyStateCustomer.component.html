     <div class="row">
        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
            <div class="card">
                <div class="body">
                    <div class="responsive_table">                    
                            <mat-table #table [dataSource]="advanceTableDutyStateCustomer" matSort class="mat-cell">
                                <ng-container matColumnDef="id">
                                    <mat-header-cell *matHeaderCellDef mat-sort-header>Id</mat-header-cell>
                                    <mat-cell *matCellDef="let row">{{row.dutyStateCustomerID}}</mat-cell>
                                </ng-container>

                                <ng-container matColumnDef="state">
                                    <mat-header-cell *matHeaderCellDef mat-sort-header>State</mat-header-cell>
                                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                        {{row.state}}</mat-cell>
                                </ng-container>
    
                                <ng-container matColumnDef="changeDateTime">
                                    <mat-header-cell *matHeaderCellDef mat-sort-header>Date/Time</mat-header-cell>
                                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                        {{ row.changeDateTime | date: 'yyyy-MM-dd' }} / {{ row.changeDateTime | date: 'HH:mm:ss' }}</mat-cell>
                                </ng-container>
    
                                <ng-container matColumnDef="reasonOfChange">
                                    <mat-header-cell *matHeaderCellDef mat-sort-header> Reason Of Changes</mat-header-cell>
                                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                        {{row.reasonOfChange}}</mat-cell>
                                </ng-container>
    
                                <ng-container matColumnDef="changedBy">
                                    <mat-header-cell *matHeaderCellDef mat-sort-header>Change By</mat-header-cell>
                                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                        {{row.firstName}} {{row.lastName}}</mat-cell>
                                </ng-container>
    
                                <!-- <ng-container matColumnDef="amount">
                                    <mat-header-cell *matHeaderCellDef mat-sort-header>Amount</mat-header-cell>
                                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                        {{row.amount}}</mat-cell>
                                </ng-container>
     -->
                                <!-- <ng-container matColumnDef="status">
                                    <mat-header-cell *matHeaderCellDef>Activation Status</mat-header-cell>
                                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                                        {{row.activationStatus===true ? 'Active' : 'Deleted'}}</mat-cell>
                                </ng-container> -->
    
                                <!-- actions -->
                                <ng-container matColumnDef="actions">
                                    <mat-header-cell *matHeaderCellDef class="pr-0" [ngClass]="'tbl-col-width-per-9'">Actions</mat-header-cell>
                                    <mat-cell *matCellDef="let row; let i=index;" class="pr-0" [ngClass]="'tbl-col-width-per-9'">
                                        <button mat-raised-button color="primary" (contextmenu)="onContextMenu($event, row)" (click)="onContextMenu($event, row)">
                                            Actions
                                    </button>
                                    </mat-cell>
                                </ng-container>
                                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                                <mat-row *matRowDef="let row; columns: displayedColumns;" [style.cursor]="'pointer'" matRipple>
                                </mat-row>
                            </mat-table>
                            <!-- context menu start -->
                            <div style="visibility: hidden; position: fixed" [style.left]="contextMenuPosition.x" [style.top]="contextMenuPosition.y" [matMenuTriggerFor]="contextMenu">
                            </div>
                            <mat-menu #contextMenu="matMenu">
                                <ng-template matMenuContent let-item="item">
                                    <button mat-menu-item (click)="editCall(item)">
                                    <mat-icon>create</mat-icon>
                                    <span>Edit</span>
                                    </button>
                                    <!-- <button mat-menu-item (click)="deleteItem(item)">
                                    <mat-icon>delete</mat-icon>
                                    <span>Delete</span>
                                    </button> -->
                                </ng-template>
                            </mat-menu>
                    </div>
                </div>
            </div>
        </div>
    </div>
