<div class="row">
    <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="card">
            <div class="body">
                <div class="responsive_table">                    
                         <mat-table #table [dataSource]="advanceTableSP" matSort class="mat-cell">
                <ng-container matColumnDef="salesPerson">
                    <mat-header-cell *matHeaderCellDef mat-sort-header>Sales Person</mat-header-cell>
                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                        {{row.salesPerson}}</mat-cell>
                </ng-container>

                <ng-container matColumnDef="status">
                    <mat-header-cell *matHeaderCellDef>Activation Status</mat-header-cell>
                    <mat-cell *matCellDef="let row" (contextmenu)="onContextMenu($event, row)">
                        
                        {{row.activationStatus===true ? 'Active' : 'Deleted'}}</mat-cell>
                </ng-container>
                <!-- actions -->
                <ng-container matColumnDef="actions">
                    <mat-header-cell *matHeaderCellDef class="pr-0" [ngClass]="'tbl-col-width-per-9'">Actions</mat-header-cell>
                    <mat-cell *matCellDef="let row; let i=index;" class="pr-0" [ngClass]="'tbl-col-width-per-9'">
                        <button mat-raised-button color="primary" (contextmenu)="onContextMenu($event, row)" (click)="onContextMenu($event, row)">
                            Actions
                    </button>
                    </mat-cell>
                </ng-container>
                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                <mat-row *matRowDef="let row; columns: displayedColumns;" [style.cursor]="'pointer'" matRipple>
                </mat-row>
            </mat-table>
            <div style="visibility: hidden; position: fixed" [style.left]="contextMenuPosition.x" [style.top]="contextMenuPosition.y" [matMenuTriggerFor]="contextMenu">
            </div>
            <mat-menu #contextMenu="matMenu">
              <ng-template matMenuContent let-item="item">
                  <!-- <button mat-menu-item (click)="addNew()">
                  <mat-icon>add_box</mat-icon>
                  <span>Add</span>
                  </button> -->
                  <button mat-menu-item (click)="updateSalesPerson(item)">
                  <mat-icon>create</mat-icon>
                  <span>Edit</span>
                  </button>
                  <button mat-menu-item (click)="deleteSalesPerson(item)">
                  <mat-icon>delete</mat-icon>
                  <span>Delete</span>
                  </button>
                  <!-- <button mat-menu-item (click)="refresh()">
              <mat-icon>refresh</mat-icon>
          <span>Refresh</span>
      </button> -->

              </ng-template>
          </mat-menu>
                </div>
            </div>
        </div>
    </div>
</div>
