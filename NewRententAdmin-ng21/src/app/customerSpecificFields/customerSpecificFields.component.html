
<div class="row">
    <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        
                <div class="addContainer">
                    <div class="modalHeader">
                        <div class="editRowModal">
                            <div class="modalHeader clearfix">
                                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                                <div class="modal-about">
                                    <div class="font-weight-bold p-t-5 font-17">
                                        </div>
                                </div>
                            </div>
                        </div>
                        <!-- <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
                      <mat-icon>close</mat-icon>
                    </button> -->
                    </div>
                    <div mat-dialog-content>
                        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
                            <div class="row">
                                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                    <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                                        <mat-label>Field 1</mat-label>
                                        <input matInput formControlName="field1">
                                    </mat-form-field>
                                </div>
                
                                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                    <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                                        <mat-label>Field 2</mat-label>
                                        <input matInput formControlName="field2">
                                    </mat-form-field>
                                </div>
                            </div>
                          
                            <div class="row">
                                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                    <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                                        <mat-label>Field 3</mat-label>
                                        <input matInput formControlName="field3">
                                    </mat-form-field>
                                </div>
                
                                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                    <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                                        <mat-label>Field 4</mat-label>
                                        <input matInput formControlName="field4">
                                    </mat-form-field>
                                </div>
                            </div>
                            <br>
                            <div class="row">
                                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                                    <div class="example-button-row">
                                        <button mat-raised-button style="background-color: #bcb4db">Save</button>
                                        <button mat-raised-button style="background-color: #f29f99" tabindex="-1">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
           
    </div>
</div>
