<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}} For {{SupplierName}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">

            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <!-- <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>City</mat-label>
                        <mat-select matInput formControlName="cityID" required>
                            <mat-option [value]="City.geoPointID" *ngFor="let City of CityList">{{City.geoPointName}}</mat-option>
                        </mat-select>                            
                    </mat-form-field> -->
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>City</mat-label>                      
                        <input  required type="text" matInput [matAutocomplete]="auto3"
                        formControlName="city">
                        <mat-autocomplete #auto3="matAutocomplete" (optionSelected)="onCitySelected($event.option.value)">
                            <mat-option *ngFor="let options of filteredCityOptions | async"
                                [value]="options.geoPointName" (click)="getCityID(options.geoPointID)">
                                {{options.geoPointName}}
                            </mat-option>
                        </mat-autocomplete>
                        <mat-error *ngIf="advanceTableForm.controls['city'].hasError('cityInvalid')">
                            Please select a  City 
                         </mat-error>
                    </mat-form-field>
                </div>

                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                            <mat-label>Activation Status</mat-label>
                            <mat-select formControlName="activationStatus">
                                <mat-option [value]=true>Active</mat-option>
                                <mat-option [value]=false>Deleted</mat-option>
                            </mat-select>
    
                            <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                                Activation Status is required
                            </mat-error>
                        </mat-form-field>
                    </div> 
            </div>                    
            
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <!-- Save button with loading state -->
                        <button
                          mat-raised-button
                          color="primary"
                          [disabled]="!advanceTableForm.valid || isLoading"
                          (click)="confirmAdd()"
                          *ngIf="!isLoading"
                        >
                          Save
                        </button>
                        <mat-spinner *ngIf="isLoading" diameter="30"></mat-spinner>
                    
                        <!-- Reset button -->
                        <button
                          *ngIf="action === 'add'"
                          mat-raised-button
                          color="warn"
                          (click)="reset()"
                          tabindex="-1"
                          [disabled]="isLoading"
                        >
                          Reset
                        </button>
                    
                        <!-- Cancel button -->
                        <button
                          *ngIf="action === 'edit'"
                          mat-raised-button
                          color="warn"
                          (click)="onNoClick()"
                          tabindex="-1"
                          [disabled]="isLoading"
                        >
                          Cancel
                        </button>
                    </div>
                </div>
            </div>
        </form>
  </div>
