<div class="sales-overview-chart-container">
  <mat-card>
    <div class="chart-header">
      <div class="chart-title">
        <h2>{{ title }}</h2>
        <div class="chart-subtitle">
          <span class="total-sales">{{ formatCurrency(totalSales) }}</span>
          <div class="growth-indicator" [ngClass]="{'positive': isPositiveGrowth, 'negative': !isPositiveGrowth}">
            <mat-icon>{{ isPositiveGrowth ? 'trending_up' : 'trending_down' }}</mat-icon>
            <span>{{ growthPercentage | number:'1.1-1' }}%</span>
          </div>
        </div>
      </div>
      <div class="chart-actions">
        <button mat-icon-button [matMenuTriggerFor]="menu">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item>
            <mat-icon>file_download</mat-icon>
            <span>Export</span>
          </button>
          <button mat-menu-item>
            <mat-icon>print</mat-icon>
            <span>Print</span>
          </button>
          <button mat-menu-item>
            <mat-icon>refresh</mat-icon>
            <span>Refresh</span>
          </button>
        </mat-menu>
      </div>
    </div>

    @if (data && data.length > 0) {
      <div class="chart-content">
        <apx-chart [series]="chartOptions.series!" [chart]="chartOptions.chart!" [xaxis]="chartOptions.xaxis!"
          [yaxis]="chartOptions.yaxis!" [dataLabels]="chartOptions.dataLabels!" [grid]="chartOptions.grid!"
          [stroke]="chartOptions.stroke!" [tooltip]="chartOptions.tooltip!" [legend]="chartOptions.legend!"
        [colors]="chartOptions.colors!" [fill]="chartOptions.fill!"></apx-chart>
      </div>
    }

    @if (!data || data.length === 0) {
      <div class="chart-empty">
        <mat-icon>insert_chart</mat-icon>
        <p>No sales data available</p>
      </div>
    }
  </mat-card>
</div>
