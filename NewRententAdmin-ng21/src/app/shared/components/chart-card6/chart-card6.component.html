<mat-card class="chart-card6">
    <mat-card-content>
        <!-- Header Section -->
        <div class="card-header">
            <div class="header-content">
                <div class="title-section">
                    <mat-icon class="views-icon">visibility</mat-icon>
                    <span class="card-title">{{ title }}</span>
                </div>
                <mat-icon class="more-options" [matMenuTriggerFor]="menu">more_horiz</mat-icon>
                <mat-menu #menu="matMenu">
                    <button mat-menu-item>
                        <mat-icon>refresh</mat-icon>
                        <span>Refresh</span>
                    </button>
                    <button mat-menu-item>
                        <mat-icon>download</mat-icon>
                        <span>Export</span>
                    </button>
                </mat-menu>
            </div>
        </div>

        <!-- Stats Section -->
        <div class="stats-section">
            <div class="main-stat">
                <span class="total-count">{{ totalViews }}</span>
                <span class="stat-label">{{ subtitle }}</span>
            </div>
            <div class="date-range">
                {{ dateRange }}
            </div>
        </div>

        <!-- Chart Section -->
        <div class="chart-container">
            <apx-chart #chart [series]="chartOptions.series!" [chart]="chartOptions.chart!"
                [xaxis]="chartOptions.xaxis!" [dataLabels]="chartOptions.dataLabels!" [grid]="chartOptions.grid!"
                [stroke]="chartOptions.stroke!" [tooltip]="chartOptions.tooltip!"
                [plotOptions]="chartOptions.plotOptions!" [fill]="chartOptions.fill!" [colors]="chartOptions.colors!">
            </apx-chart>
        </div>
    </mat-card-content>
</mat-card>
