<mat-card class="compact-stat-card" [ngClass]="{ 'compact': compact }">
  <mat-card-content>
    <div class="stat-container">
      @if (icon) {
        <div class="stat-icon" [style.background-color]="iconBackground" [ngClass]="iconColorClass">
          <mat-icon>{{ icon }}</mat-icon>
        </div>
      }

      <div class="stat-content">
        <div class="stat-value">
          @if (prefix) {
            <span class="prefix">{{ prefix }}</span>
          }
          <span class="value">{{ value }}</span>
          @if (suffix) {
            <span class="suffix">{{ suffix }}</span>
          }
        </div>
        <h4 class="stat-title">{{ title }}</h4>

        @if (trend !== 0) {
          <div class="trend-info">
            <mat-icon class="trend-icon" [ngClass]="trendClass">{{ trendIcon }}</mat-icon>
            <span class="trend-value" [ngClass]="trendClass">
              {{ trend > 0 ? '+' : '' }}{{ trend }}%
            </span>
            @if (trendLabel) {
              <span class="trend-label">{{ trendLabel }}</span>
            }
          </div>
        }
      </div>
    </div>
  </mat-card-content>
</mat-card>
