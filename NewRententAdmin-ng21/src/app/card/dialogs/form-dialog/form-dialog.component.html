<div mat-dialog-content>
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">

        <div class="row">
            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                    <mat-label>Card Name</mat-label>
                    <input required matInput formControlName="card">
                    <mat-error *ngIf="advanceTableForm.get('card').hasError('required')">
                        Card Name is required
                    </mat-error>
                </mat-form-field>
                </div>
                <!-- <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Payment Network</mat-label>
                         <mat-select required #paymentNetworkVal [class.is-invalid]="paymentNetworkVal.invalid && paymentNetworkVal.touched" formControlName="paymentNetworkID">
                            <mat-option [value]="PaymentNetwork.paymentNetworkID" *ngFor="let PaymentNetwork of PaymentNetworkList">{{PaymentNetwork.paymentNetwork}}</mat-option>
                        </mat-select>
                        <mat-error>
                            Please select a Payment Network
                        </mat-error>
                    </mat-form-field>
                </div>   -->
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always"> 
                        <mat-label>Payment Network</mat-label>                       
                        <input required type="text" matInput [matAutocomplete]="auto"
                        formControlName="paymentNetwork">
                        <mat-autocomplete #auto="matAutocomplete" (optionSelected)="onPaymentNetworkSelected($event.option.value)">
                            <mat-option *ngFor="let options of filteredOptions | async"
                                [value]="options.paymentNetwork" (click)="getCardID(options.paymentNetworkID)">
                                {{options.paymentNetwork}}
                            </mat-option>
                        </mat-autocomplete>
                        <mat-error *ngIf="advanceTableForm.controls['paymentNetwork'].hasError('paymentNetworkTypeInvalid')">
                            Please select a Payment Network
                        </mat-error>

                    </mat-form-field>
                </div>
        </div> 
        
       <div class="row">
            <!-- <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                    <mat-label>Card Type</mat-label>
                     <mat-select required #cardTypeVal [class.is-invalid]="cardTypeVal.invalid && cardTypeVal.touched" formControlName="cardTypeID">
                        <mat-option [value]="CardType.cardTypeID" *ngFor="let CardType of CardTypeList">{{CardType.cardType}}</mat-option>
                    </mat-select>
                    <mat-error>
                        Please select a Card Type
                    </mat-error>
                </mat-form-field>
                </div> -->
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always"> 
                        <mat-label>Card Type</mat-label>                       
                        <input required type="text" matInput [matAutocomplete]="auto1"
                        formControlName="cardType">
                        <mat-autocomplete #auto1="matAutocomplete" (optionSelected)="onCardTypeSelected($event.option.value)">
                            <mat-option *ngFor="let options of filteredCardOptions | async"
                                [value]="options.cardType" (click)="getCardTypeID(options.cardTypeID)">
                                {{options.cardType}}
                            </mat-option>
                        </mat-autocomplete>
                        <mat-error *ngIf="advanceTableForm.controls['cardType'].hasError('cardTypeInvalid')">
                            Please select a Card Type
                        </mat-error>

                    </mat-form-field>
                </div>
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Activation Status</mat-label>
                        <mat-select formControlName="activationStatus">
                            <mat-option [value]=true>Active</mat-option>
                            <mat-option [value]=false>Deleted</mat-option>
                        </mat-select>

                        <mat-error *ngIf="advanceTableForm.get('activationStatus').hasError('required')">
                            Activation Status is required
                        </mat-error>
                    </mat-form-field>
                </div>  
        </div> 
        <div class="row">
            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                <div class="example-button-row">
                    <button mat-raised-button color="primary" *ngIf="saveDisabled" [type]="submit" [disabled]="!advanceTableForm.valid"  (click)="confirmAdd()">Save</button>
                    <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                    <button *ngIf="action==='add'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Reset</button>
                    <button *ngIf="action==='edit'" mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                </div>
            </div>
        </div>
    </form>
</div>
