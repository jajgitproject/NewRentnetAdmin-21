        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                        <div class="addContainer">
                                <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
                                    <div class="row">
                                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                            <mat-label>Send Feedback Email :</mat-label>
                                            &nbsp;&nbsp;
                                            <mat-radio-group>
                                                <mat-radio-button style="margin-left: 70px;" color="primary" value="Yes">Yes</mat-radio-button>
                                                <mat-radio-button style="margin-left: 70px;" color="primary" value="No">No</mat-radio-button>
                                            </mat-radio-group>
                                        </div>
                        
                                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                            <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                                                <mat-label>Booking No.</mat-label>
                                                <input matInput>
                                            </mat-form-field>
                                        </div>
                                    </div>
                        
                                    <div class="row">
                                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                            <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                                                <mat-label>Reservation Mode</mat-label>
                                                <mat-select formControlName="activationStatus">
                                                    <mat-option value="Email">Email</mat-option>
                                                    <mat-option value="Api">Api</mat-option>
                                                    <mat-option value="B2C">B2C</mat-option>
                                                    <mat-option value="SBT">SBT</mat-option>
                                                    <mat-option value="CustomerApp">Customer App</mat-option>
                                                </mat-select>
                                            </mat-form-field>
                                        </div>
                        
                                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                            <mat-form-field appearance="outline" floatLabel="always" class="example-full-width" >
                                                <mat-label>Res. Mode Details</mat-label>
                                                <input matInput>
                                            </mat-form-field>
                                        </div>
                                    </div>
                                  
                                    <div class="row">
                                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                            <mat-form-field appearance="outline" floatLabel="always" class="example-full-width" >
                                                <mat-label>Permanent Special Instructions</mat-label>
                                                <input matInput>
                                            </mat-form-field>
                                        </div>
                                    </div>
                        
                                    <div class="row">
                                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                            <mat-form-field appearance="outline" floatLabel="always" class="example-full-width" >
                                                <mat-label>Payer Name</mat-label>
                                                <input matInput>
                                            </mat-form-field>
                                        </div>
                        
                                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                            <mat-form-field appearance="outline" floatLabel="always" class="example-full-width" >
                                                <mat-label>Payer Address</mat-label>
                                                <input matInput>
                                            </mat-form-field>
                                        </div>
                                    </div>
                        
                                    <div class="row">
                                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                            <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                                                <mat-label>Field 1</mat-label>
                                                <input matInput>
                                            </mat-form-field>
                                        </div>
                        
                                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                                            <mat-form-field appearance="outline" floatLabel="always" class="example-full-width">
                                                <mat-label>Field 2</mat-label>
                                                <input matInput>
                                            </mat-form-field>
                                        </div>
                                    </div>
                        
                                    <br>
                                    <div class="row">
                                        <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                                            <div class="example-button-row">
                                                <button mat-raised-button style="background-color: #bcb4db">Save</button>
                                        <button mat-raised-button style="background-color: #f29f99" tabindex="-1">Cancel</button>
                                            </div>
                                        </div>
                                    </div>
                                </form>
                            </div>
                    
                
        </div>
    </div>
