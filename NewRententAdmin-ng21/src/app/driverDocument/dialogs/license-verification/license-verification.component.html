<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">

                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                    </div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <h2 mat-dialog-title>This Document is already Verified !!!</h2>
        <h3 mat-dialog-title>If you save this record,verication will be cancelled...</h3>
        <div mat-dialog-actions class="mb-1">
            <button mat-flat-button color="primary" [mat-dialog-close]="1" (click)="Put()">
              Accept
            </button>
            <button mat-flat-button color="warn" (click)="onNoClick()" tabindex="-1">Reject</button>
          </div>
    </div>
</div>
