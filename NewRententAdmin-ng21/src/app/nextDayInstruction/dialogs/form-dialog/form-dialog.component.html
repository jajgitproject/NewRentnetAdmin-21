<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                         <div *ngIf="!isSaveAllowed">
                        <span style="color:rgb(150, 4, 4);margin-bottom: 10px;font-style: italic;font-size: 12px;">({{verifyDutyStatusAndCacellationStatus}} !!!!!)</span>
                    </div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline"  floatLabel="always">
                        <mat-label>Next Day Instruction Date</mat-label>
                        <input required
                         matInput 
                         [matDatepicker]="nextDayInstructionDate" 
                         placeholder="DD/MM/YYYY"
                         (blur)="onBlurUpdateDate($event.target.value)" 
                         formControlName="nextDayInstructionDate">
                        <mat-datepicker-toggle matSuffix [for]="nextDayInstructionDate"></mat-datepicker-toggle>
                        <mat-datepicker #nextDayInstructionDate></mat-datepicker>
                        <mat-error *ngIf="advanceTableForm.get('nextDayInstructionDate').hasError('required')">
                            Next Day Instruction Date is required
                        </mat-error>
                        <mat-error *ngIf="advanceTableForm.get('nextDayInstructionDate')?.hasError('invalidDate')">
                            Invalid date format. Use DD/MM/YYYY.
                        </mat-error>
                    </mat-form-field>

                </div> 
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Next Day Instruction Time</mat-label>
                        <input required matInput [owlDateTimeTrigger]="time2" [owlDateTime]="time2" (input)="onTimeInput($event)"
                            formControlName="nextDayInstructionTime">
                        <mat-icon matSuffix [owlDateTimeTrigger]="time2" class="date-icon">schedule</mat-icon>
                        <owl-date-time [pickerType]="'timer'" #time2></owl-date-time>

                        <mat-error *ngIf="advanceTableForm.get('nextDayInstructionTime').hasError('required')">
                            Next Day Instruction Time is required
                        </mat-error>
                    </mat-form-field>

                </div>
            </div>
          
            <div class="row">                
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Next Day Instruction</mat-label>
                        <input required matInput formControlName="nextDayInstruction">

                        <mat-error *ngIf="advanceTableForm.get('nextDayInstruction').hasError('required')">
                            Next Day Instruction is required
                        </mat-error>
                    </mat-form-field>

                </div>

            </div>
            <div class="row">
                <!-- <div *ngIf="isSaveAllowed">
                    <span style="color:red;margin-bottom: 10px;">{{verifyDutyStatusAndCacellationStatus}}</span>
                </div> -->
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" *ngIf="saveDisabled" [type]="submit" [disabled]="!advanceTableForm.valid || !isSaveAllowed"  (click)="confirmAdd()">Save</button>
                        <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                        <button *ngIf="action==='add'" mat-raised-button color="warn" (click)="onNoClick()"
                        tabindex="-1">Reset</button>
                    <button *ngIf="action==='edit'" mat-raised-button color="warn" (click)="onNoClick()"
                        tabindex="-1">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
