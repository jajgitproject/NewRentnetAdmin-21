<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}  {{CustomerContractName}} </div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">

            <div class="row">
                 <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <mat-form-field class="example-full-width" appearance="outline" floatLabel="always">
                        <mat-label>Customer Contract Name</mat-label>
                        <input required type="text" matInput [matAutocomplete]="auto" formControlName="customerContractName">
                        <mat-autocomplete #auto (optionSelected)="OnCustomerContractNameSelect($event.option.value)">
                            <mat-option *ngFor="let option of filteredOptions | async"
                                [value]="option.customerContractName" (click)="GetID(option.customerContractID)">
                                {{option.customerContractName}}
                            </mat-option>
                        </mat-autocomplete>
                    </mat-form-field>
                </div>
    
                
            </div>   
         
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button *ngIf="saveDisabled" color="primary" [type]="submit" [disabled]="!advanceTableForm.valid"  (click)="onImportClick()">Save</button>
                        <mat-spinner *ngIf="!saveDisabled" diameter="30"></mat-spinner>
                    </div>
                </div>
            </div>
        </form>
  </div>
