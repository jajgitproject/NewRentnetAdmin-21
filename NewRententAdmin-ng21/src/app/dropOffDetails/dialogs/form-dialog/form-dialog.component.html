<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <!-- <img [src]='advanceTable.img' alt="avatar"> -->
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        {{dialogTitle}}</div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
    </div>
    <div mat-dialog-content>
        <form class="register-form m-4" [formGroup]="advanceTableForm" (ngSubmit)="submit">
            <div class="row">
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                   <span class="TDValueBold"> Date</span> <br>
                   <span class="TDValue"> 22 Dec 2023</span>
                    
                </div>
                
                <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                    <span class="TDValueBold"> Time</span> <br>
                    <span class="TDValue"> 17:30</span>
                 </div>
            </div>
             
                <div class="row">
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                       <span class="TDValueBold"> Country</span> <br>
                       <span class="TDValue"> India</span>
                    </div>
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <span class="TDValueBold"> State</span> <br>
                        <span class="TDValue"> Delhi</span>
                     </div>
                </div>
                <div class="row">
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                       <span class="TDValueBold">City Group</span> <br>
                       <span class="TDValue"> Delhi/NCR</span>
                    </div>
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <span class="TDValueBold"> City</span> <br>
                        <span class="TDValue"> South Delhi</span>
                    </div>
                </div>

                <div class="row" >
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <span class="TDValueBold"> Google Address String</span> <br>
                        <span class="TDValue"> B-156, Amar Colony, Lajpat Nagar - 4</span>
                    </div>
                    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                        <span class="TDValueBold"> Address Details</span> <br>
                        <span class="TDValue"> B-156, Amar Colony, Lajpat Nagar - 4</span>
                     </div>
                     
                </div>
           
            <div class="row" >
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="mapouter">
                        <div class="gmap_canvas">
                            <iframe class="gmap_iframe" frameborder="0" scrolling="no" marginheight="0" 
                            marginwidth="0" src="https://maps.google.com/maps?width=600&amp;height=400&amp;hl=en&amp;q=amar colony&amp;t=&amp;z=14&amp;ie=UTF8&amp;iwloc=B&amp;output=embed">
                            </iframe>
                            <a href="https://formatjson.org/">
                                format json
                            </a>
                    </div>
                    <style>.mapouter{position:relative;text-align:right;width:600px;height:400px;}.gmap_canvas {overflow:hidden;background:none!important;width:600px;height:400px;}.gmap_iframe {width:600px!important;height:400px!important;}
                    </style>
                    </div>
                </div>
                 
            </div>
            <div class="row">
                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                    <div class="example-button-row">
                        <button mat-raised-button color="primary" [type]="submit" [disabled]="!advanceTableForm.valid"  (click)="confirmAdd()">Save</button>
                        <button mat-raised-button color="warn" (click)="onNoClick()" tabindex="-1">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
