<div class="container">
  <h2 mat-dialog-title>Previous Record will be Deactivated and <br>New Record will be created in its place.</h2>
  <div mat-dialog-actions class="mb-1">
    <button mat-flat-button color="primary" (click)="confirmAdd()">
      OK
    </button>
    <button mat-flat-button (click)="onNoClick()" tabindex="-1">Cancel</button>
  </div>
</div>
